<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека группы | Студия гитары</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #1e1e2f, #2a2a40);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8em;
            font-weight: bold;
        }
        .logo span {
            color: #f0b90b;
        }
        .user-badge {
            background: #ffc107;
            color: #1e1e2f;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
        }
        .group-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .group-name {
            font-size: 1.2em;
            font-weight: 600;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
        }
        .main-container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .upload-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .form-group input[type="file"] {
            padding: 8px;
        }
        .btn-upload {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-select {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            font-size: 1em;
            background: white;
            min-width: 150px;
        }
        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1em;
            cursor: pointer;
        }
        
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .material-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .material-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .material-preview {
            height: 180px;
            background: #1e1e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
        }
        .material-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .material-info {
            padding: 15px;
        }
        .material-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #1e1e2f;
        }
        .material-meta {
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 0.85em;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
            font-size: 1.2em;
            background: white;
            border-radius: 20px;
            grid-column: 1 / -1;
        }
        .comment-section {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fc;
            border-radius: 10px;
        }
        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .comment-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
        }
        .comment-btn {
            background: #1e1e2f;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .comment {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
        }
        .comment.teacher {
            background: #fff9e6;
            border-left: 3px solid #ffc107;
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }
        .size-hint {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .student-badge {
            background: #17a2b8;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 Guitar<span>Studio</span></div>
        <div class="group-info">
            <span class="user-badge" id="currentUserDisplay">Загрузка...</span>
            <span class="group-name" id="groupName">Загрузка...</span>
            <a href="group-chat.html?groupId=" id="chatLink" class="back-btn">← В чат</a>
            <a href="javascript:history.back()" class="back-btn">Назад</a>
        </div>
    </div>

    <div class="main-container">
        <div id="uploadError" class="error-message"></div>
        
        <div class="upload-section" id="uploadSection" style="display: none;">
            <h3 style="margin-bottom: 20px;">📤 Поделиться успехами</h3>
            <div class="upload-form">
                <div class="form-group">
                    <label>Файл (фото или видео)</label>
                    <input type="file" id="fileInput" accept="image/*,video/*">
                    <div id="sizeHint" class="size-hint">📦 IndexedDB позволяет хранить большие файлы</div>
                </div>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="fileTitle" placeholder="Например: Мой разбор песни">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="fileDescription" placeholder="Что хочешь показать?"></textarea>
                </div>
                <button class="btn-upload" onclick="uploadFile()">Загрузить</button>
            </div>
        </div>

        <div class="filters">
            <select class="filter-select" id="filterType" onchange="applyFilters()">
                <option value="">Все типы</option>
                <option value="photo">📸 Фото</option>
                <option value="video">🎥 Видео</option>
            </select>
            <button class="clear-btn" id="clearBtn" onclick="clearAllMaterials()" style="display: none;">🗑️ Очистить все</button>
        </div>

        <div id="materialsGrid" class="materials-grid">
            <div class="loading">⏳ Загрузка материалов...</div>
        </div>
    </div>

    <script>
        // Получаем ID группы из URL
        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get('groupId');
        
        // Константы
        const TEACHER_LOGIN = "EvgenyaGuitara01543";
        
        // Получаем информацию о текущем пользователе из localStorage
        const userRole = localStorage.getItem('currentUserRole') || 'student';
        const userLogin = localStorage.getItem('currentUserLogin') || (userRole === 'teacher' ? TEACHER_LOGIN : 'LeonidzasFire23457');
        const userName = localStorage.getItem('currentUserName') || (userRole === 'teacher' ? 'Евгения' : 'Ученик');
        const userDisplay = localStorage.getItem('currentUserDisplay') || (userRole === 'teacher' ? '👩‍🏫 Евгения (Учитель)' : '👨‍🎓 Ученик');
        
        console.log('========== БИБЛИОТЕКА ГРУППЫ ==========');
        console.log('Роль:', userRole);
        console.log('Логин:', userLogin);
        console.log('Имя:', userName);
        console.log('ID группы:', groupId);
        
        document.getElementById('currentUserDisplay').textContent = userDisplay;
        
        // Загружаем группы
        let groups = JSON.parse(localStorage.getItem('groups')) || [];
        const currentGroup = groups.find(g => g.id == groupId);
        
        if (!currentGroup) {
            alert('Группа не найдена');
            window.location.href = userRole === 'teacher' ? 'teacher-cabinet.html' : 'student-cabinet.html';
        }
        
        document.getElementById('groupName').textContent = currentGroup.name;
        document.getElementById('chatLink').href = `group-chat.html?groupId=${groupId}`;
        
        // Показываем форму загрузки ТОЛЬКО ученикам
        if (userRole === 'student') {
            document.getElementById('uploadSection').style.display = 'block';
            console.log('✅ Ученик - форма загрузки ПОКАЗАНА');
        } else {
            console.log('❌ Учитель - форма загрузки СКРЫТА');
            // Учителю показываем кнопку очистки
            document.getElementById('clearBtn').style.display = 'inline-block';
        }
        
        // ========== INDEXEDDB ДЛЯ ХРАНЕНИЯ МАТЕРИАЛОВ ГРУППЫ ==========
        const DB_NAME = 'GuitarStudioDB';
        const DB_VERSION = 1;
        const STORE_NAME = `group_library_${groupId}`;
        
        let db = null;
        let allMaterials = [];
        
        // Открытие базы данных
        function openDB() {
            return new Promise((resolve, reject) => {
                if (db) {
                    resolve(db);
                    return;
                }
                
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = function(event) {
                    console.error('Ошибка открытия БД:', event);
                    reject('Ошибка открытия базы данных');
                };
                
                request.onsuccess = function(event) {
                    db = event.target.result;
                    console.log('База данных открыта');
                    resolve(db);
                };
                
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('type', 'type', { unique: false });
                        store.createIndex('uploadedBy', 'uploadedBy', { unique: false });
                        console.log(`Хранилище ${STORE_NAME} создано`);
                    }
                };
            });
        }
        
        // Получение всех материалов
        async function getAllMaterials() {
            try {
                const database = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = database.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    
                    request.onsuccess = function() {
                        allMaterials = request.result || [];
                        console.log(`Загружено материалов: ${allMaterials.length}`);
                        resolve(allMaterials);
                    };
                    
                    request.onerror = function() {
                        reject('Ошибка получения материалов');
                    };
                });
            } catch (error) {
                console.error('Ошибка:', error);
                return [];
            }
        }
        
        // Добавление материала
        async function addMaterial(material) {
            const database = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.add(material);
                
                request.onsuccess = function() {
                    allMaterials.push(material);
                    console.log('Материал добавлен');
                    resolve();
                };
                
                request.onerror = function(event) {
                    console.error('Ошибка добавления:', event);
                    reject('Ошибка сохранения материала');
                };
            });
        }
        
        // Удаление материала
        async function deleteMaterialFromDB(id) {
            const database = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                
                request.onsuccess = function() {
                    allMaterials = allMaterials.filter(m => m.id !== id);
                    resolve();
                };
                
                request.onerror = function() {
                    reject('Ошибка удаления');
                };
            });
        }
        
        // Очистка всех материалов
        async function clearAllMaterialsFromDB() {
            const database = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                
                request.onsuccess = function() {
                    allMaterials = [];
                    resolve();
                };
                
                request.onerror = function() {
                    reject('Ошибка очистки');
                };
            });
        }
        
        // Применение фильтров
        function applyFilters() {
            renderMaterials();
        }
        
        // Отображение материалов
        async function renderMaterials() {
            const grid = document.getElementById('materialsGrid');
            const filterType = document.getElementById('filterType').value;
            
            grid.innerHTML = '<div class="loading">⏳ Загрузка материалов...</div>';
            
            const materials = await getAllMaterials();
            
            let filteredMaterials = [...materials];
            
            if (filterType) {
                filteredMaterials = filteredMaterials.filter(m => m.type === filterType);
            }
            
            filteredMaterials.sort((a, b) => b.id - a.id);
            
            if (filteredMaterials.length === 0) {
                grid.innerHTML = '<div class="empty-state">📭 В библиотеке группы пока нет материалов</div>';
                return;
            }
            
            let html = '';
            filteredMaterials.forEach(m => {
                let previewHtml = '';
                if (m.type === 'video') {
                    previewHtml = '<div class="material-preview">🎥</div>';
                } else if (m.fileData && m.fileData.startsWith('data:image')) {
                    previewHtml = `<div class="material-preview"><img src="${m.fileData}" alt="${m.title}"></div>`;
                } else {
                    previewHtml = '<div class="material-preview">📸</div>';
                }
                
                let fileSizeText = '';
                if (m.fileSize) {
                    if (m.fileSize < 1024 * 1024) {
                        fileSizeText = `${(m.fileSize / 1024).toFixed(1)} КБ`;
                    } else {
                        fileSizeText = `${(m.fileSize / 1024 / 1024).toFixed(1)} МБ`;
                    }
                }
                
                // Загружаем комментарии к материалу
                const comments = JSON.parse(localStorage.getItem(`comments_${groupId}_${m.id}`)) || [];
                
                let commentsHtml = '';
                comments.forEach(c => {
                    const isTeacherComment = c.sender === TEACHER_LOGIN;
                    commentsHtml += `
                        <div class="comment ${isTeacherComment ? 'teacher' : ''}">
                            <strong>${c.senderName}:</strong> ${c.text}
                            <div style="color: #999; font-size: 0.8em;">${c.date}</div>
                        </div>
                    `;
                });
                
                html += `
                    <div class="material-card">
                        ${previewHtml}
                        <div class="material-info">
                            <div class="material-title">${m.title}</div>
                            <div>${m.description || ''}</div>
                            <div class="material-meta">
                                <span>👤 ${m.uploadedBy} <span class="student-badge">${m.uploadedBy === 'Ученик' ? 'ученик' : 'учитель'}</span></span>
                                <span>📅 ${m.date} (${fileSizeText})</span>
                            </div>
                            
                            <div class="comment-section">
                                <div style="font-weight: 600; margin-bottom: 5px;">💬 Комментарии:</div>
                                ${commentsHtml || '<div style="color: #999;">Пока нет комментариев</div>'}
                                
                                ${userRole === 'teacher' ? `
                                    <div class="comment-input">
                                        <input type="text" id="comment_${m.id}" placeholder="Напишите комментарий..." onkeypress="checkCommentEnter(event, '${groupId}', ${m.id})">
                                        <button class="comment-btn" onclick="addComment('${groupId}', ${m.id})">➤</button>
                                    </div>
                                ` : ''}
                                
                                ${userRole === 'student' && m.uploadedByLogin === userLogin ? `
                                    <button class="comment-btn" style="margin-top: 10px; background: #dc3545;" onclick="deleteMyMaterial(${m.id})">🗑️ Удалить</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        // Загрузка файла
        async function uploadFile() {
            const errorDiv = document.getElementById('uploadError');
            errorDiv.style.display = 'none';
            errorDiv.innerHTML = '';
            
            const file = document.getElementById('fileInput').files[0];
            const title = document.getElementById('fileTitle').value.trim();
            const description = document.getElementById('fileDescription').value.trim();
            
            if (!file) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Выберите файл для загрузки!';
                return;
            }
            
            if (!title) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Введите название материала!';
                return;
            }
            
            if (!description) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Введите описание материала!';
                return;
            }
            
            const uploadBtn = document.querySelector('.btn-upload');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '⏳ Загрузка...';
            uploadBtn.disabled = true;
            
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const material = {
                    id: Date.now(),
                    type: file.type.startsWith('video') ? 'video' : 'photo',
                    title: title,
                    description: description,
                    fileData: e.target.result,
                    fileSize: file.size,
                    uploadedBy: userRole === 'teacher' ? 'Учитель' : 'Ученик',
                    uploadedByLogin: userLogin,
                    date: new Date().toLocaleString()
                };
                
                try {
                    await addMaterial(material);
                    console.log('Материал сохранён в IndexedDB');
                    
                    // Создаём уведомление для учителя (если загрузил ученик)
                    if (userRole === 'student') {
                        const notification = {
                            id: Date.now() + Math.random(),
                            type: 'group_material',
                            groupId: groupId,
                            groupName: currentGroup.name,
                            title: '📹 Новый материал в группе',
                            text: `Ученик ${userName} добавил новый материал: "${title}"`,
                            date: new Date().toLocaleString(),
                            read: false
                        };
                        let groupMessages = JSON.parse(localStorage.getItem('groupMessages')) || [];
                        groupMessages.push(notification);
                        localStorage.setItem('groupMessages', JSON.stringify(groupMessages));
                    }
                    
                    document.getElementById('fileInput').value = '';
                    document.getElementById('fileTitle').value = '';
                    document.getElementById('fileDescription').value = '';
                    
                    await renderMaterials();
                    alert('✅ Материал загружен!');
                    
                    uploadBtn.innerHTML = originalText;
                    uploadBtn.disabled = false;
                    
                } catch (saveError) {
                    console.error('Ошибка сохранения:', saveError);
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Ошибка сохранения материала!';
                    uploadBtn.innerHTML = originalText;
                    uploadBtn.disabled = false;
                }
            };
            
            reader.onerror = function() {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Ошибка при чтении файла!';
                uploadBtn.innerHTML = originalText;
                uploadBtn.disabled = false;
            };
            
            reader.readAsDataURL(file);
        }
        
        // Добавление комментария
        function addComment(groupId, materialId) {
            const input = document.getElementById(`comment_${materialId}`);
            const text = input.value.trim();
            
            if (!text) return;
            
            const comment = {
                id: Date.now(),
                sender: userLogin,
                senderName: userName,
                text: text,
                date: new Date().toLocaleString()
            };
            
            const comments = JSON.parse(localStorage.getItem(`comments_${groupId}_${materialId}`)) || [];
            comments.push(comment);
            localStorage.setItem(`comments_${groupId}_${materialId}`, JSON.stringify(comments));
            
            input.value = '';
            renderMaterials();
        }
        
        function checkCommentEnter(e, groupId, materialId) {
            if (e.key === 'Enter') {
                addComment(groupId, materialId);
            }
        }
        
        // Удаление своего материала (только для ученика)
        async function deleteMyMaterial(id) {
            if (confirm('Удалить этот материал?')) {
                await deleteMaterialFromDB(id);
                await renderMaterials();
                alert('✅ Материал удалён');
            }
        }
        
        // Очистка всех материалов (только для учителя)
        async function clearAllMaterials() {
            if (confirm('ВНИМАНИЕ! Это удалит ВСЕ материалы из библиотеки группы. Продолжить?')) {
                await clearAllMaterialsFromDB();
                await renderMaterials();
                alert('✅ Все материалы удалены');
            }
        }
        
        // Инициализация
        async function init() {
            await renderMaterials();
        }
        
        init();
        
        // Обновление каждые 3 секунды
        setInterval(async () => {
            const newMaterials = await getAllMaterials();
            if (JSON.stringify(newMaterials) !== JSON.stringify(allMaterials)) {
                renderMaterials();
            }
        }, 3000);
    </script>
</body>
</html>
