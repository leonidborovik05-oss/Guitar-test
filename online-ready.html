<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подготовка к онлайн-уроку | Студия гитары</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 1.8em;
            font-weight: bold;
            color: #4a2b7a;
        }
        .logo span {
            color: #f0b90b;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-name {
            background: #3a3a55;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
        }
        .main-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .ready-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e1e2f;
            margin-bottom: 20px;
            font-size: 2.2em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        /* Предпросмотр камеры */
        .preview-container {
            width: 100%;
            background: #1e1e2f;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            aspect-ratio: 16/9;
            position: relative;
        }
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #2a2a40;
        }
        .preview-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2em;
            background: #2a2a40;
            pointer-events: none;
        }
        
        /* Настройки устройств */
        .device-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .device-group {
            background: #f8f9fc;
            border-radius: 15px;
            padding: 20px;
        }
        .device-group label {
            display: block;
            font-weight: 600;
            color: #1e1e2f;
            margin-bottom: 10px;
        }
        .device-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .device-status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #28a745;
            font-size: 0.95em;
        }
        .device-status.error {
            color: #dc3545;
        }
        
        /* Участники */
        .participants-list {
            background: #f8f9fc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .participants-title {
            font-weight: 600;
            color: #1e1e2f;
            margin-bottom: 15px;
        }
        .participant-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #eaeef2;
        }
        .participant-item:last-child {
            border-bottom: none;
        }
        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e1e2f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .participant-name {
            flex: 1;
            font-weight: 500;
        }
        .participant-status {
            color: #28a745;
            font-size: 0.9em;
        }
        .waiting-badge {
            background: #ffc107;
            color: #1e1e2f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        /* Кнопки */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #28a745;
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40,167,69,0.3);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Индикатор ожидания */
        .waiting-indicator {
            text-align: center;
            padding: 40px;
            background: #f8f9fc;
            border-radius: 15px;
            margin-top: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 Guitar<span>Studio</span></div>
        <div class="user-info">
            <div class="user-name" id="userNameDisplay">Загрузка...</div>
            <a href="javascript:history.back()" class="back-btn">← Назад</a>
        </div>
    </div>

    <div class="main-container">
        <div class="ready-card">
            <h1>📹 Подготовка к онлайн-уроку</h1>
            <p class="subtitle">Проверь камеру и микрофон. Учитель начнёт урок, когда все будут готовы.</p>
            
            <!-- Предпросмотр камеры -->
            <div class="preview-container">
                <video id="localVideo" autoplay playsinline muted></video>
                <div id="previewPlaceholder" class="preview-placeholder">
                    📷 Камера не активна
                </div>
            </div>
            
            <!-- Настройки устройств -->
            <div class="device-settings">
                <div class="device-group">
                    <label>📷 Камера</label>
                    <select id="cameraSelect" class="device-select" onchange="switchCamera()">
                        <option value="">Загрузка камер...</option>
                    </select>
                    <div id="cameraStatus" class="device-status">✅ Камера работает</div>
                </div>
                
                <div class="device-group">
                    <label>🎤 Микрофон</label>
                    <select id="microphoneSelect" class="device-select" onchange="switchMicrophone()">
                        <option value="">Загрузка микрофонов...</option>
                    </select>
                    <div id="microphoneStatus" class="device-status">✅ Микрофон работает</div>
                </div>
                
                <div class="device-group">
                    <label>🔊 Динамики</label>
                    <select id="speakerSelect" class="device-select" onchange="switchSpeaker()">
                        <option value="">Загрузка динамиков...</option>
                    </select>
                    <button class="btn-secondary" style="padding: 8px; margin-top: 10px;" onclick="testSpeaker()">🔊 Тест</button>
                </div>
            </div>
            
            <!-- Список участников -->
            <div class="participants-list">
                <div class="participants-title">👥 Участники урока</div>
                <div id="participantsContainer">
                    <!-- Будут добавляться участники -->
                </div>
                <div id="waitingMessage" class="waiting-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>Ожидание начала урока...</p>
                    <p style="color: #666; font-size: 0.9em; margin-top: 10px;">Учитель начнёт, когда все подключатся</p>
                </div>
            </div>
            
            <!-- Кнопки -->
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="window.location.href='javascript:history.back()'">Отмена</button>
                <button class="btn btn-primary" id="joinBtn" onclick="joinLesson()" disabled>
                    🚀 Войти в урок
                </button>
            </div>
        </div>
    </div>

    <script>
        // Получаем роль из URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); // 'teacher' или 'student'
        
        // Данные пользователя
        let userName = '';
        let userLogin = '';
        
        if (role === 'teacher') {
            userName = 'Евгения (Учитель)';
            userLogin = 'EvgenyaGuitara01543';
        } else {
            userName = 'Леонид Зас (Ученик)';
            userLogin = 'LeonidzasFire23457';
        }
        
        document.getElementById('userNameDisplay').textContent = userName;
        
        // WebRTC переменные
        let localStream = null;
        let devices = {
            cameras: [],
            microphones: [],
            speakers: []
        };
        
        // Загружаем учеников для отображения
        let students = JSON.parse(localStorage.getItem('students')) || [];
        
        // Инициализация
        async function initDevices() {
            try {
                // Запрашиваем доступ к камере и микрофону
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('previewPlaceholder').style.display = 'none';
                
                // Получаем список устройств
                const devicesList = await navigator.mediaDevices.enumerateDevices();
                
                devices.cameras = devicesList.filter(d => d.kind === 'videoinput');
                devices.microphones = devicesList.filter(d => d.kind === 'audioinput');
                devices.speakers = devicesList.filter(d => d.kind === 'audiooutput');
                
                // Заполняем селекты
                const cameraSelect = document.getElementById('cameraSelect');
                cameraSelect.innerHTML = devices.cameras.map(c => 
                    `<option value="${c.deviceId}">${c.label || 'Камера'}</option>`
                ).join('');
                
                const micSelect = document.getElementById('microphoneSelect');
                micSelect.innerHTML = devices.microphones.map(m => 
                    `<option value="${m.deviceId}">${m.label || 'Микрофон'}</option>`
                ).join('');
                
                const speakerSelect = document.getElementById('speakerSelect');
                speakerSelect.innerHTML = devices.speakers.map(s => 
                    `<option value="${s.deviceId}">${s.label || 'Динамики'}</option>`
                ).join('');
                
                // Активируем кнопку входа
                document.getElementById('joinBtn').disabled = false;
                
                // Обновляем список участников
                updateParticipantsList();
                
            } catch (err) {
                console.error('Ошибка доступа к устройствам:', err);
                document.getElementById('cameraStatus').textContent = '❌ Нет доступа к камере/микрофону';
                document.getElementById('cameraStatus').className = 'device-status error';
                document.getElementById('microphoneStatus').className = 'device-status error';
            }
        }
        
        // Переключение камеры
        async function switchCamera() {
            const deviceId = document.getElementById('cameraSelect').value;
            if (!deviceId || !localStream) return;
            
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.stop();
            }
            
            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: deviceId } },
                audio: { deviceId: { exact: localStream.getAudioTracks()[0]?.getSettings().deviceId } }
            });
            
            localStream = newStream;
            document.getElementById('localVideo').srcObject = localStream;
        }
        
        // Переключение микрофона
        async function switchMicrophone() {
            const deviceId = document.getElementById('microphoneSelect').value;
            if (!deviceId || !localStream) return;
            
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.stop();
            }
            
            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: localStream.getVideoTracks()[0]?.getSettings().deviceId } },
                audio: { deviceId: { exact: deviceId } }
            });
            
            localStream = newStream;
            document.getElementById('localVideo').srcObject = localStream;
        }
        
        // Переключение динамиков
        function switchSpeaker() {
            const deviceId = document.getElementById('speakerSelect').value;
            if (deviceId && localStream) {
                // В реальном WebRTC это сложнее, для демо просто сохраняем выбор
                localStorage.setItem('preferredSpeaker', deviceId);
            }
        }
        
        // Тест динамиков
        function testSpeaker() {
            const audio = new Audio();
            audio.src = 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA'; // Короткий звуковой сигнал
            audio.play();
        }
        
        // Обновление списка участников
        function updateParticipantsList() {
            const container = document.getElementById('participantsContainer');
            const waitingMsg = document.getElementById('waitingMessage');
            
            // Получаем список участников из localStorage (в реальном проекте через сигнальный сервер)
            let participants = JSON.parse(localStorage.getItem('lessonParticipants')) || [];
            
            // Добавляем себя, если ещё нет
            if (!participants.some(p => p.login === userLogin)) {
                participants.push({
                    login: userLogin,
                    name: userName,
                    role: role,
                    ready: true,
                    joined: false
                });
                localStorage.setItem('lessonParticipants', JSON.stringify(participants));
            }
            
            // Отображаем участников
            let html = '';
            participants.forEach(p => {
                const isTeacher = p.role === 'teacher';
                html += `
                    <div class="participant-item">
                        <div class="participant-avatar">${p.name.charAt(0)}</div>
                        <div class="participant-name">
                            ${p.name}
                            ${isTeacher ? ' 👑' : ''}
                        </div>
                        <div class="participant-status">
                            ${p.ready ? '✅ Готов' : '⏳ Подключается'}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // Показываем сообщение ожидания, если учитель ещё не начал
            const lessonStatus = JSON.parse(localStorage.getItem('onlineLesson')) || { active: false };
            if (!lessonStatus.active) {
                waitingMsg.style.display = 'block';
            } else {
                waitingMsg.style.display = 'none';
            }
        }
        
        // Вход в урок
        function joinLesson() {
            // Обновляем статус урока
            const lessonStatus = JSON.parse(localStorage.getItem('onlineLesson')) || { active: false };
            
            // Если учитель начинает урок
            if (role === 'teacher') {
                lessonStatus.active = true;
                lessonStatus.startedBy = userLogin;
                lessonStatus.startTime = new Date().toISOString();
                localStorage.setItem('onlineLesson', JSON.stringify(lessonStatus));
            }
            
            // Переходим на страницу урока
            window.location.href = `online-lesson.html?role=${role}`;
        }
        
        // Проверяем, начал ли учитель урок
        function checkLessonStart() {
            const lessonStatus = JSON.parse(localStorage.getItem('onlineLesson')) || { active: false };
            if (lessonStatus.active && role === 'student') {
                // Если ученик и урок уже идёт, предлагаем присоединиться
                if (confirm('Урок уже начался! Присоединиться?')) {
                    window.location.href = `online-lesson.html?role=${role}`;
                }
            }
        }
        
        // Запускаем инициализацию
        initDevices();
        
        // Обновляем список участников каждые 2 секунды
        setInterval(updateParticipantsList, 2000);
        
        // Проверяем начало урока каждые 2 секунды
        setInterval(checkLessonStart, 2000);
    </script>
</body>
</html>
