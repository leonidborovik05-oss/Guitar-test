                        </ul>
                        
                        <div class="note">
                            <strong>💡 Главный совет:</strong> Любите музыку и получайте удовольствие от игры! Гитара — это инструмент для самовыражения и радости.
                        </div>
                    `
                },
                questions: {
                    easy: [
                        { text: "Как часто менять струны?", options: ["Раз в 2-3 месяца", "Раз в год", "Никогда", "Каждую неделю"], correct: 0 },
                        { text: "Как хранить гитару?", options: ["В чехле, в сухом месте", "На солнце", "В сыром месте", "На улице"], correct: 0 },
                        { text: "Что делать перед игрой?", options: ["Разминать руки", "Сразу играть", "Настраивать после игры", "Пить кофе"], correct: 0 }
                    ],
                    medium: [
                        { text: "Как выбрать медиатор?", options: ["По толщине и материалу", "По цвету", "По форме", "Любой"], correct: 0 },
                        { text: "Как преодолеть страх сцены?", options: ["Практика и подготовка", "Алкоголь", "Отказ от выступления", "Играть тише"], correct: 0 },
                        { text: "Как найти своё звучание?", options: ["Экспериментировать", "Копировать кумиров", "Использовать стандартные настройки", "Не искать"], correct: 0 }
                    ],
                    hard: [
                        { text: "Какой главный совет для начинающих?", options: ["Заниматься регулярно", "Играть сложные песни", "Не заниматься", "Только теория"], correct: 0 },
                        { text: "Что важно для сценического выступления?", options: ["Уверенность и подготовка", "Только техника", "Только внешний вид", "Только громкость"], correct: 0 },
                        { text: "Что помогает развить чувство ритма?", options: ["Игра под метроном", "Быстрая игра", "Медленная игра", "Игра без метронома"], correct: 0 }
                    ]
                }
            }
        ];

        // Текущее состояние
        let currentTopicIndex = 0;
        let userAnswers = {};
        
        // Загружаем сохранённые ответы
        const savedAnswers = JSON.parse(localStorage.getItem(`tasks_answers_${userLogin}`));
        if (savedAnswers) {
            userAnswers = savedAnswers;
        } else {
            // Инициализируем
            topics.forEach((topic, i) => {
                if (!userAnswers[i]) {
                    userAnswers[i] = {};
                }
            });
        }
        
        // Функция обновления прогресса на левой панели
        function updateTopicProgress() {
            const topicList = document.getElementById('topicList');
            let html = '';
            
            topics.forEach((topic, i) => {
                let answeredCount = 0;
                const totalQuestions = 9; // 3 легких + 3 средних + 3 сложных
                for (let j = 0; j < totalQuestions; j++) {
                    if (userAnswers[i] && userAnswers[i][j] !== undefined && userAnswers[i][j] !== null) {
                        answeredCount++;
                    }
                }
                html += `
                    <button class="topic-btn ${i === currentTopicIndex ? 'active' : ''}" onclick="switchTopic(${i})">
                        <span>${topic.name}</span>
                        <span class="topic-progress">${answeredCount}/9</span>
                    </button>
                `;
            });
            
            topicList.innerHTML = html;
            
            document.getElementById('topicTitle').textContent = topics[currentTopicIndex].name;
            document.getElementById('topicDescription').textContent = topics[currentTopicIndex].description;
        }
        
        // Переключение темы
        function switchTopic(index) {
            currentTopicIndex = index;
            updateTopicProgress();
            renderContent();
        }
        
        // Рендер всего контента темы
        function renderContent() {
            const topic = topics[currentTopicIndex];
            const container = document.getElementById('contentContainer');
            
            let html = `
                <div class="intro-section">
                    <h3>${topic.intro.title}</h3>
                    ${topic.intro.content}
                </div>
                
                <div class="tests-section">
                    <h3>📝 Проверь себя!</h3>
            `;
            
            // Добавляем вопросы по сложности
            const difficulties = [
                { name: "Лёгкие вопросы", key: "easy", badge: "difficulty-easy", icon: "🌱" },
                { name: "Средние вопросы", key: "medium", badge: "difficulty-medium", icon: "🌿" },
                { name: "Сложные вопросы", key: "hard", badge: "difficulty-hard", icon: "🌳" }
            ];
            
            let questionIndex = 0;
            
            difficulties.forEach(diff => {
                const questionsList = topic.questions[diff.key];
                if (questionsList) {
                    html += `
                        <div style="margin-top: 25px;">
                            <h4 style="margin-bottom: 15px;">
                                <span class="difficulty-badge ${diff.badge}">${diff.icon} ${diff.name}</span>
                            </h4>
                    `;
                    
                    questionsList.forEach((q, idx) => {
                        const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][questionIndex] : null;
                        html += `
                            <div class="question-block" data-qidx="${questionIndex}">
                                <div class="question-text">${questionIndex + 1}. ${q.text}</div>
                                <div class="answers-list" data-qidx="${questionIndex}">
                                    ${q.options.map((opt, optIdx) => `
                                        <div class="answer-item ${savedAnswer === optIdx ? 'selected' : ''}" onclick="selectAnswer(${currentTopicIndex}, ${questionIndex}, ${optIdx})">
                                            <div class="answer-marker">${String.fromCharCode(65 + optIdx)}</div>
                                            <div class="answer-text">${opt}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                        questionIndex++;
                    });
                    html += `</div>`;
                }
            });
            
            // Добавляем кнопку проверки
            html += `
                    <div class="submit-section">
                        <button class="submit-btn" onclick="checkAnswers()">✅ Проверить ответы</button>
                    </div>
                    <div id="resultMessage" class="result-message" style="display: none;"></div>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // Выбор ответа
        function selectAnswer(topicId, questionIndex, answerIndex) {
            if (!userAnswers[topicId]) {
                userAnswers[topicId] = {};
            }
            userAnswers[topicId][questionIndex] = answerIndex;
            saveAnswers();
            
            // Обновляем отображение выбранного ответа
            const questionBlock = document.querySelector(`.question-block[data-qidx="${questionIndex}"]`);
            if (questionBlock) {
                const answers = questionBlock.querySelectorAll('.answer-item');
                answers.forEach((item, idx) => {
                    if (idx === answerIndex) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }
            
            updateTopicProgress();
        }
        
        // Проверка ответов
        function checkAnswers() {
            const topic = topics[currentTopicIndex];
            let correctCount = 0;
            let totalQuestions = 0;
            const results = [];
            
            let questionIndex = 0;
            const difficulties = ['easy', 'medium', 'hard'];
            
            difficulties.forEach(diff => {
                const questionsList = topic.questions[diff];
                if (questionsList) {
                    questionsList.forEach((q, idx) => {
                        const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][questionIndex] : null;
                        const isCorrect = savedAnswer === q.correct;
                        if (isCorrect) correctCount++;
                        totalQuestions++;
                        results.push({
                            number: questionIndex + 1,
                            text: q.text,
                            isCorrect: isCorrect,
                            correctAnswer: q.options[q.correct]
                        });
                        questionIndex++;
                    });
                }
            });
            
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.style.display = 'block';
            
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            
            if (correctCount === totalQuestions) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `
                    <strong>🎉 Отлично! ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>
                    Вы отлично усвоили тему! Можете переходить к следующей.
                `;
            } else if (correctCount >= 7) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `
                    <strong>✅ Хороший результат! ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>
                    Рекомендуем повторить вопросы, на которые ответили неправильно.
                `;
            } else {
                resultDiv.className = 'result-message error';
                resultDiv.innerHTML = `
                    <strong>❌ ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>
                    Рекомендуем перечитать вступление и пройти тест заново.
                `;
            }
            
            // Добавляем детализацию
            let detailsHtml = '<div style="margin-top: 15px; text-align: left;"><strong>📋 Разбор ответов:</strong><ul style="margin-top: 10px;">';
            results.forEach(r => {
                detailsHtml += `
                    <li style="margin: 5px 0; ${r.isCorrect ? 'color: #28a745;' : 'color: #dc3545;'}">
                        <strong>Вопрос ${r.number}:</strong> ${r.text}<br>
                        ${!r.isCorrect ? `&nbsp;&nbsp;✓ Правильный ответ: ${r.correctAnswer}` : '✓ Ответ верный'}
                    </li>
                `;
            });
            detailsHtml += '</ul></div>';
            resultDiv.innerHTML += detailsHtml;
            
            // Сохраняем прогресс
            const progress = JSON.parse(localStorage.getItem(`progress_${userLogin}`)) || {};
            progress.tasks_progress = progress.tasks_progress || {};
            progress.tasks_progress[currentTopicIndex] = { correct: correctCount, total: totalQuestions, percentage: percentage };
            localStorage.setItem(`progress_${userLogin}`, JSON.stringify(progress));
        }
        
        // Сохранение ответов
        function saveAnswers() {
            localStorage.setItem(`tasks_answers_${userLogin}`, JSON.stringify(userAnswers));
        }
        
        // Инициализация
        updateTopicProgress();
        renderContent();
    </script>
</body>
</html>
