            },
            {

                name: "🌟 Советы профессионалов",
                description: "Полезные советы и лайфхаки",
                questions: [
                    { text: "Как часто менять струны?", options: ["Раз в 2-3 месяца", "Раз в год", "Никогда", "Каждую неделю"], correct: 0 },
                    { text: "Как хранить гитару?", options: ["В чехле, в сухом месте", "На солнце", "В сыром месте", "На улице"], correct: 0 },
                    { text: "Что делать перед игрой?", options: ["Разминать руки", "Сразу играть", "Настраивать после игры", "Пить кофе"], correct: 0 },
                    { text: "Как выбрать медиатор?", options: ["По толщине и материалу", "По цвету", "По форме", "Любой"], correct: 0 },
                    { text: "Что важно для сценического выступления?", options: ["Уверенность и подготовка", "Только техника", "Только внешний вид", "Только громкость"], correct: 0 },
                    { text: "Как преодолеть страх сцены?", options: ["Практика и подготовка", "Алкоголь", "Отказ от выступления", "Играть тише"], correct: 0 },
                    { text: "Какой совет для начинающих?", options: ["Заниматься регулярно", "Играть сложные песни", "Не заниматься", "Только теория"], correct: 0 },
                    { text: "Как найти своё звучание?", options: ["Экспериментировать", "Копировать кумиров", "Использовать стандартные настройки", "Не искать"], correct: 0 },
                    { text: "Что важно для записи?", options: ["Хорошее оборудование и акустика", "Только гитара", "Только микрофон", "Любое помещение"], correct: 0 },
                    { text: "Главный совет профессионалов?", options: ["Любить музыку и заниматься", "Быстро играть", "Много теории", "Только практика"], correct: 0 }
                ]
            }
        ];

        // Текущее состояние
        let currentTopicIndex = 0;
        let currentQuestionIndex = 0;
        let userAnswers = {};
        
        // Загружаем сохранённые ответы
        const savedAnswers = JSON.parse(localStorage.getItem(`tasks_answers_${userLogin}`));
        if (savedAnswers) {
            userAnswers = savedAnswers;
        } else {
            // Инициализируем
            topics.forEach((topic, i) => {
                if (!userAnswers[i]) {
                    userAnswers[i] = Array(10).fill(null);
                }
            });
        }
        
        // Функция обновления прогресса на левой панели
        function updateTopicProgress() {
            const topicList = document.getElementById('topicList');
            let html = '';
            
            topics.forEach((topic, i) => {
                const answered = userAnswers[i] ? userAnswers[i].filter(a => a !== null).length : 0;
                html += `
                    <button class="topic-btn ${i === currentTopicIndex ? 'active' : ''}" onclick="switchTopic(${i})">
                        <span>${topic.name}</span>
                        <span class="topic-progress">${answered}/10</span>
                    </button>
                `;
            });
            
            topicList.innerHTML = html;
            
            // Обновляем заголовок темы
            document.getElementById('topicTitle').textContent = topics[currentTopicIndex].name;
            document.getElementById('topicDescription').textContent = topics[currentTopicIndex].description;
            
            // Обновляем общий прогресс
            const totalAnswered = topics.reduce((sum, topic, i) => {
                return sum + (userAnswers[i] ? userAnswers[i].filter(a => a !== null).length : 0);
            }, 0);
            const totalQuestions = topics.length * 10;
            document.getElementById('progressBadge').textContent = `${totalAnswered}/${totalQuestions}`;
        }
        
        // Переключение темы
        function switchTopic(index) {
            currentTopicIndex = index;
            currentQuestionIndex = 0;
            updateTopicProgress();
            updateQuestionDisplay();
        }
        
        // Обновление отображения вопроса
        function updateQuestionDisplay() {
            const topic = topics[currentTopicIndex];
            const question = topic.questions[currentQuestionIndex];
            
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('questionCounter').textContent = `Вопрос ${currentQuestionIndex + 1} из 10`;
            
            // Генерируем ответы
            const answersHtml = question.options.map((opt, idx) => {
                const selected = userAnswers[currentTopicIndex] && userAnswers[currentTopicIndex][currentQuestionIndex] === idx ? 'selected' : '';
                return `
                    <div class="answer-item ${selected}" onclick="selectAnswer(${idx})">
                        <div class="answer-marker">${String.fromCharCode(65 + idx)}</div>
                        <div class="answer-text">${opt}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('answersList').innerHTML = answersHtml;
            
            // Обновляем кнопки навигации
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === 9;
            
            const submitBtn = document.getElementById('submitBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentQuestionIndex === 9) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
            
            document.getElementById('resultMessage').style.display = 'none';
        }
        
        // Выбор ответа
        function selectAnswer(answerIndex) {
            if (!userAnswers[currentTopicIndex]) {
                userAnswers[currentTopicIndex] = Array(10).fill(null);
            }
            userAnswers[currentTopicIndex][currentQuestionIndex] = answerIndex;
            saveAnswers();
            updateQuestionDisplay();
            updateTopicProgress();
        }
        
        // Предыдущий вопрос
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                updateQuestionDisplay();
            }
        }
        
        // Следующий вопрос
        function nextQuestion() {
            if (currentQuestionIndex < 9) {
                currentQuestionIndex++;
                updateQuestionDisplay();
            }
        }
        
        // Завершение теста по теме
        function submitTest() {
            const topic = topics[currentTopicIndex];
            let correctCount = 0;
            topic.questions.forEach((q, idx) => {
                if (userAnswers[currentTopicIndex] && userAnswers[currentTopicIndex][idx] === q.correct) {
                    correctCount++;
                }
            });
            
            // Сохраняем прогресс
            const progress = JSON.parse(localStorage.getItem(`progress_${userLogin}`)) || {
                beginner: 0,
                intermediate: 0,
                expert: 0,
                tasks_completed: {}
            };
            progress.tasks_completed = progress.tasks_completed || {};
            progress.tasks_completed[currentTopicIndex] = correctCount;
            localStorage.setItem(`progress_${userLogin}`, JSON.stringify(progress));
            
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-message ' + (correctCount >= 7 ? 'success' : 'error');
            resultDiv.innerHTML = `
                <strong>${correctCount}/10 правильных ответов!</strong><br>
                ${correctCount >= 7 ? '✅ Тема успешно пройдена! Можете переходить к следующей.' : '❌ Попробуйте ещё раз, чтобы лучше освоить тему.'}
            `;
            
            updateTopicProgress();
        }
        
        // Сохранение ответов
        function saveAnswers() {
            localStorage.setItem(`tasks_answers_${userLogin}`, JSON.stringify(userAnswers));
        }
        
        // Инициализация
        updateTopicProgress();
        updateQuestionDisplay();
    </script>
