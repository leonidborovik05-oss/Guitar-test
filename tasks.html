                hard: [
                    { text: "Какой совет для начинающих?", options: ["Заниматься регулярно", "Играть сложные песни", "Не заниматься", "Только теория"], correct: 0 },
                    { text: "Как найти своё звучание?", options: ["Экспериментировать", "Копировать кумиров", "Использовать стандартные настройки", "Не искать"], correct: 0 },
                    { text: "Главный совет профессионалов?", options: ["Любить музыку и заниматься", "Быстро играть", "Много теории", "Только практика"], correct: 0 }
                ]

        // Текущее состояние
        let currentTopicIndex = 0;
        let currentQuestionIndex = 0;
        let userAnswers = {}; // { topicId: { 0: essayText, 1: answerIndex, ... } }
        
        // Загружаем сохранённые ответы
        const savedAnswers = JSON.parse(localStorage.getItem(`tasks_answers_${userLogin}`));
        if (savedAnswers) {
            userAnswers = savedAnswers;
        } else {
            // Инициализируем
            topics.forEach((topic, i) => {
                if (!userAnswers[i]) {
                    userAnswers[i] = {};
                    // Инициализируем все вопросы пустыми значениями
                    for (let j = 0; j < 10; j++) {
                        userAnswers[i][j] = null;
                    }
                }
            });
        }
        
        // Функция получения типа вопроса
        function getQuestionType(topicId, questionIndex) {
            if (questionIndex === 0) return 'intro';
            if (questionIndex <= 3) return 'easy';
            if (questionIndex <= 6) return 'medium';
            return 'hard';
        }
        
        // Функция получения данных вопроса
        function getQuestion(topicId, questionIndex) {
            const topic = topics[topicId];
            if (questionIndex === 0) return topic.intro;
            if (questionIndex <= 3) return topic.easy[questionIndex - 1];
            if (questionIndex <= 6) return topic.medium[questionIndex - 4];
            return topic.hard[questionIndex - 7];
        }
        
        // Функция обновления прогресса на левой панели
        function updateTopicProgress() {
            const topicList = document.getElementById('topicList');
            let html = '';
            
            topics.forEach((topic, i) => {
                let answeredCount = 0;
                for (let j = 0; j < 10; j++) {
                    if (userAnswers[i] && userAnswers[i][j] !== null && userAnswers[i][j] !== '') {
                        answeredCount++;
                    }
                }
                html += `
                    <button class="topic-btn ${i === currentTopicIndex ? 'active' : ''}" onclick="switchTopic(${i})">
                        <span>${topic.name}</span>
                        <span class="topic-progress">${answeredCount}/10</span>
                    </button>
                `;
            });
            
            topicList.innerHTML = html;
            
            // Обновляем заголовок темы
            document.getElementById('topicTitle').textContent = topics[currentTopicIndex].name;
            document.getElementById('topicDescription').textContent = topics[currentTopicIndex].description;
            
            // Обновляем общий прогресс
            let totalAnswered = 0;
            topics.forEach((_, i) => {
                for (let j = 0; j < 10; j++) {
                    if (userAnswers[i] && userAnswers[i][j] !== null && userAnswers[i][j] !== '') {
                        totalAnswered++;
                    }
                }
            });
            const totalQuestions = topics.length * 10;
            document.getElementById('progressBadge').textContent = `${totalAnswered}/${totalQuestions}`;
        }
        
        // Переключение темы
        function switchTopic(index) {
            currentTopicIndex = index;
            currentQuestionIndex = 0;
            updateTopicProgress();
            updateQuestionDisplay();
        }
        
        // Обновление отображения вопроса
        function updateQuestionDisplay() {
            const question = getQuestion(currentTopicIndex, currentQuestionIndex);
            const questionType = getQuestionType(currentTopicIndex, currentQuestionIndex);
            const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][currentQuestionIndex] : null;
            
            document.getElementById('questionCounter').textContent = `Вопрос ${currentQuestionIndex + 1} из 10`;
            
            let html = '';
            
            if (questionType === 'intro') {
                // Вступительный вопрос с развёрнутым ответом
                html = `
                    <div class="question-text">${question.text.replace(/\n/g, '<br>')}</div>
                    <div class="essay-answer">
                        <textarea id="essayAnswer" placeholder="Напишите свой развёрнутый ответ здесь...">${savedAnswer || ''}</textarea>
                        <div class="essay-hint">💡 Постарайтесь ответить на все подвопросы максимально подробно</div>
                    </div>
                `;
            } else {
                // Обычный вопрос с вариантами ответов
                html = `
                    <div class="question-text">${question.text}</div>
                    <div class="answers-list" id="answersList">
                        ${question.options.map((opt, idx) => `
                            <div class="answer-item ${savedAnswer === idx ? 'selected' : ''}" onclick="selectAnswer(${idx})">
                                <div class="answer-marker">${String.fromCharCode(65 + idx)}</div>
                                <div class="answer-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            document.getElementById('questionContainer').innerHTML = html;
            
            // Обновляем кнопки навигации
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === 9;
            
            const submitBtn = document.getElementById('submitBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentQuestionIndex === 9) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
            
            document.getElementById('resultMessage').style.display = 'none';
        }
        
        // Выбор ответа для обычного вопроса
        function selectAnswer(answerIndex) {
            if (!userAnswers[currentTopicIndex]) {
                userAnswers[currentTopicIndex] = {};
            }
            userAnswers[currentTopicIndex][currentQuestionIndex] = answerIndex;
            saveAnswers();
            updateQuestionDisplay();
            updateTopicProgress();
        }
        
        // Сохранение ответа на вступительный вопрос
        function saveEssayAnswer() {
            const textarea = document.getElementById('essayAnswer');
            if (textarea) {
                if (!userAnswers[currentTopicIndex]) {
                    userAnswers[currentTopicIndex] = {};
                }
                userAnswers[currentTopicIndex][currentQuestionIndex] = textarea.value;
                saveAnswers();
                updateTopicProgress();
            }
        }
        
        // Предыдущий вопрос
        function prevQuestion() {
            // Сохраняем текущий ответ, если это вступительный вопрос
            if (getQuestionType(currentTopicIndex, currentQuestionIndex) === 'intro') {
                saveEssayAnswer();
            }
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                updateQuestionDisplay();
            }
        }
        
        // Следующий вопрос
        function nextQuestion() {
            // Сохраняем текущий ответ, если это вступительный вопрос
            if (getQuestionType(currentTopicIndex, currentQuestionIndex) === 'intro') {
                saveEssayAnswer();
            }
            if (currentQuestionIndex < 9) {
                currentQuestionIndex++;
                updateQuestionDisplay();
            }
        }
        
        // Завершение теста по теме
        function submitTest() {
            // Сохраняем последний ответ, если это вступительный вопрос
            if (getQuestionType(currentTopicIndex, currentQuestionIndex) === 'intro') {
                saveEssayAnswer();
            }
            
            // Подсчитываем правильные ответы на тестовые вопросы
            let correctCount = 0;
            let essayAnswered = false;
            
            for (let i = 0; i < 10; i++) {
                const qType = getQuestionType(currentTopicIndex, i);
                const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][i] : null;
                
                if (qType === 'intro') {
                    if (savedAnswer && savedAnswer.trim().length > 20) {
                        essayAnswered = true;
                    }
                } else {
                    const question = getQuestion(currentTopicIndex, i);
                    if (savedAnswer !== null && savedAnswer === question.correct) {
                        correctCount++;
                    }
                }
            }
            
            const totalTestQuestions = 9; // 3 лёгких + 3 средних + 3 сложных
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.style.display = 'block';
            
            if (correctCount === totalTestQuestions && essayAnswered) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `
                    <strong>🎉 Отлично! Тема пройдена!</strong><br>
                    Вы правильно ответили на все ${totalTestQuestions} тестовых вопросов и написали развёрнутый ответ.<br>
                    ✅ Можете переходить к следующей теме.
                `;
            } else if (correctCount >= 7 && essayAnswered) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `
                    <strong>✅ Хороший результат!</strong><br>
                    Вы ответили правильно на ${correctCount}/${totalTestQuestions} вопросов и написали развёрнутый ответ.<br>
                    Рекомендуем повторить сложные моменты.
                `;
            } else {
                resultDiv.className = 'result-message error';
                resultDiv.innerHTML = `
                    <strong>❌ Нужно ещё поработать над темой</strong><br>
                    Вы ответили правильно на ${correctCount}/${totalTestQuestions} вопросов.<br>
                    ${!essayAnswered ? '⚠️ Развёрнутый ответ не заполнен или слишком короткий.' : ''}<br>
                    Попробуйте пройти тему заново, чтобы лучше усвоить материал.
                `;
            }
            
            // Сохраняем прогресс
            const progress = JSON.parse(localStorage.getItem(`progress_${userLogin}`)) || {};
            progress.tasks_completed = progress.tasks_completed || {};
            progress.tasks_completed[currentTopicIndex] = { correct: correctCount, essay: essayAnswered };
            localStorage.setItem(`progress_${userLogin}`, JSON.stringify(progress));
            
            updateTopicProgress();
        }
        
        // Сохранение всех ответов
        function saveAnswers() {
            localStorage.setItem(`tasks_answers_${userLogin}`, JSON.stringify(userAnswers));
        }
        
        // Инициализация
        updateTopicProgress();
        updateQuestionDisplay();
        
        // Автосохранение при вводе текста в textarea
        setInterval(() => {
            const textarea = document.getElementById('essayAnswer');
            if (textarea && getQuestionType(currentTopicIndex, currentQuestionIndex) === 'intro') {
                if (!userAnswers[currentTopicIndex]) {
                    userAnswers[currentTopicIndex] = {};
                }
                if (userAnswers[currentTopicIndex][currentQuestionIndex] !== textarea.value) {
                    userAnswers[currentTopicIndex][currentQuestionIndex] = textarea.value;
                    saveAnswers();
                    updateTopicProgress();
                }
            }
        }, 1000);
