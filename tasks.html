        // Текущее состояние
        let currentTopicIndex = 0;
        let currentDifficulty = 'all'; // all, easy, medium, hard
        let userAnswers = {};
        let supabaseInitialized = false;
        
        // Загрузка ответов из Supabase
        async function loadAnswersFromSupabase() {
            try {
                const { data, error } = await supabase
                    .from('tasks_answers')
                    .select('answers')
                    .eq('student_login', userLogin);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    userAnswers = data[0].answers || {};
                }
                
                // Инициализируем структуру для всех тем
                for (let i = 0; i < topics.length; i++) {
                    if (!userAnswers[i]) {
                        userAnswers[i] = {};
                    }
                }
                
                supabaseInitialized = true;
                updateTopicProgress();
                renderContent();
            } catch (error) {
                console.error('Ошибка загрузки ответов:', error);
                supabaseInitialized = true;
                updateTopicProgress();
                renderContent();
            }
        }
        
        // Сохранение ответов в Supabase
        async function saveAnswersToSupabase() {
            if (!supabase) return;
            
            try {
                const { data, error: selectError } = await supabase
                    .from('tasks_answers')
                    .select('id')
                    .eq('student_login', userLogin);
                
                if (selectError) throw selectError;
                
                if (data && data.length > 0) {
                    await supabase
                        .from('tasks_answers')
                        .update({ answers: userAnswers })
                        .eq('student_login', userLogin);
                } else {
                    await supabase
                        .from('tasks_answers')
                        .insert([{
                            student_login: userLogin,
                            answers: userAnswers
                        }]);
                }
            } catch (error) {
                console.error('Ошибка сохранения ответов:', error);
            }
        }
        
        // Функция обновления прогресса
        function updateTopicProgress() {
            const topicList = document.getElementById('topicList');
            let html = '';
            
            topics.forEach((topic, i) => {
                let answeredCount = 0;
                const answers = userAnswers[i] || {};
                const totalQuestions = 9;
                for (let j = 0; j < totalQuestions; j++) {
                    if (answers[j] !== undefined && answers[j] !== null) {
                        answeredCount++;
                    }
                }
                html += `
                    <button class="topic-btn ${i === currentTopicIndex ? 'active' : ''}" onclick="switchTopic(${i})">
                        <span>${topic.name}</span>
                        <span class="topic-progress">${answeredCount}/9</span>
                    </button>
                `;
            });
            
            topicList.innerHTML = html;
            document.getElementById('topicTitle').textContent = topics[currentTopicIndex].name;
            document.getElementById('topicDescription').textContent = topics[currentTopicIndex].description;
        }
        
        function switchTopic(index) {
            currentTopicIndex = index;
            currentDifficulty = 'all';
            updateTopicProgress();
            renderContent();
        }
        
        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.difficulty-btn.${difficulty}`).classList.add('active');
            renderQuestions();
        }
        
        function renderQuestions() {
            const topic = topics[currentTopicIndex];
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            
            let questionsList = [];
            
            if (currentDifficulty === 'all') {
                questionsList = [
                    ...topic.questions.easy.map((q, idx) => ({ ...q, difficulty: 'easy', originalIdx: idx })),
                    ...topic.questions.medium.map((q, idx) => ({ ...q, difficulty: 'medium', originalIdx: idx })),
                    ...topic.questions.hard.map((q, idx) => ({ ...q, difficulty: 'hard', originalIdx: idx }))
                ];
            } else if (currentDifficulty === 'easy') {
                questionsList = topic.questions.easy.map((q, idx) => ({ ...q, difficulty: 'easy', originalIdx: idx }));
            } else if (currentDifficulty === 'medium') {
                questionsList = topic.questions.medium.map((q, idx) => ({ ...q, difficulty: 'medium', originalIdx: idx }));
            } else if (currentDifficulty === 'hard') {
                questionsList = topic.questions.hard.map((q, idx) => ({ ...q, difficulty: 'hard', originalIdx: idx }));
            }
            
            let html = '';
            questionsList.forEach((q, idx) => {
                const globalIdx = getGlobalQuestionIndex(currentDifficulty, idx);
                const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][globalIdx] : null;
                
                html += `
                    <div class="question-block">
                        <div class="question-text">${idx + 1}. ${q.text}</div>
                        <div class="answers-list" data-qidx="${globalIdx}">
                            ${q.options.map((opt, optIdx) => `
                                <div class="answer-item ${savedAnswer === optIdx ? 'selected' : ''}" onclick="selectAnswer(${currentTopicIndex}, ${globalIdx}, ${optIdx})">
                                    <div class="answer-marker">${String.fromCharCode(65 + optIdx)}</div>
                                    <div class="answer-text">${opt}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function getGlobalQuestionIndex(difficulty, localIdx) {
            if (difficulty === 'all') {
                return localIdx;
            } else if (difficulty === 'easy') {
                return localIdx;
            } else if (difficulty === 'medium') {
                return 3 + localIdx;
            } else if (difficulty === 'hard') {
                return 6 + localIdx;
            }
            return localIdx;
        }
        
        function selectAnswer(topicId, questionIndex, answerIndex) {
            if (!userAnswers[topicId]) {
                userAnswers[topicId] = {};
            }
            userAnswers[topicId][questionIndex] = answerIndex;
            saveAnswersToSupabase();
            
            const questionBlock = document.querySelector(`.answers-list[data-qidx="${questionIndex}"]`);
            if (questionBlock) {
                const answers = questionBlock.querySelectorAll('.answer-item');
                answers.forEach((item, idx) => {
                    if (idx === answerIndex) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }
            
            updateTopicProgress();
        }
        
        function checkAnswers() {
            const topic = topics[currentTopicIndex];
            let questionsList = [];
            
            if (currentDifficulty === 'all') {
                questionsList = [
                    ...topic.questions.easy.map((q, idx) => ({ ...q, difficulty: 'easy', localIdx: idx, globalIdx: idx })),
                    ...topic.questions.medium.map((q, idx) => ({ ...q, difficulty: 'medium', localIdx: idx, globalIdx: 3 + idx })),
                    ...topic.questions.hard.map((q, idx) => ({ ...q, difficulty: 'hard', localIdx: idx, globalIdx: 6 + idx }))
                ];
            } else if (currentDifficulty === 'easy') {
                questionsList = topic.questions.easy.map((q, idx) => ({ ...q, difficulty: 'easy', localIdx: idx, globalIdx: idx }));
            } else if (currentDifficulty === 'medium') {
                questionsList = topic.questions.medium.map((q, idx) => ({ ...q, difficulty: 'medium', localIdx: idx, globalIdx: 3 + idx }));
            } else if (currentDifficulty === 'hard') {
                questionsList = topic.questions.hard.map((q, idx) => ({ ...q, difficulty: 'hard', localIdx: idx, globalIdx: 6 + idx }));
            }
            
            let correctCount = 0;
            const results = [];
            
            questionsList.forEach((q) => {
                const savedAnswer = userAnswers[currentTopicIndex] ? userAnswers[currentTopicIndex][q.globalIdx] : null;
                const isCorrect = savedAnswer === q.correct;
                if (isCorrect) correctCount++;
                results.push({
                    text: q.text,
                    isCorrect: isCorrect,
                    correctAnswer: q.options[q.correct],
                    userAnswer: savedAnswer !== null ? q.options[savedAnswer] : 'Не отвечено'
                });
            });
            
            const totalQuestions = questionsList.length;
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.style.display = 'block';
            
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            
            if (correctCount === totalQuestions) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `<strong>🎉 Отлично! ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>Вы отлично усвоили материал!`;
            } else if (correctCount >= Math.floor(totalQuestions * 0.7)) {
                resultDiv.className = 'result-message success';
                resultDiv.innerHTML = `<strong>✅ Хороший результат! ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>Рекомендуем повторить вопросы, на которые ответили неправильно.`;
            } else {
                resultDiv.className = 'result-message error';
                resultDiv.innerHTML = `<strong>❌ ${correctCount}/${totalQuestions} правильных ответов (${percentage}%)</strong><br>Рекомендуем перечитать вступление и пройти тест заново.`;
            }
            
            let detailsHtml = '<div style="margin-top: 15px; text-align: left;"><strong>📋 Разбор ответов:</strong><ul style="margin-top: 10px;">';
            results.forEach((r, i) => {
                detailsHtml += `
                    <li style="margin: 5px 0; ${r.isCorrect ? 'color: #28a745;' : 'color: #dc3545;'}">
                        <strong>Вопрос ${i + 1}:</strong> ${r.text}<br>
                        ${!r.isCorrect ? `&nbsp;&nbsp;✓ Правильный ответ: ${r.correctAnswer}<br>&nbsp;&nbsp;✗ Ваш ответ: ${r.userAnswer}` : '✓ Ответ верный'}
                    </li>
                `;
            });
            detailsHtml += '</ul></div>';
            resultDiv.innerHTML += detailsHtml;
            
            saveProgressToSupabase(currentTopicIndex, correctCount, totalQuestions);
        }
        
        async function saveProgressToSupabase(topicId, correctCount, totalCount) {
            if (!supabase) return;
            
            try {
                const { data, error: selectError } = await supabase
                    .from('student_progress')
                    .select('id')
                    .eq('student_login', userLogin)
                    .eq('topic_id', topicId);
                
                if (selectError) throw selectError;
                
                const percentage = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
                
                if (data && data.length > 0) {
                    await supabase
                        .from('student_progress')
                        .update({ 
                            correct_count: correctCount, 
                            total_count: totalCount,
                            percentage: percentage,
                            updated_at: new Date()
                        })
                        .eq('student_login', userLogin)
                        .eq('topic_id', topicId);
                } else {
                    await supabase
                        .from('student_progress')
                        .insert([{
                            student_login: userLogin,
                            topic_id: topicId,
                            correct_count: correctCount,
                            total_count: totalCount,
                            percentage: percentage,
                            updated_at: new Date()
                        }]);
                }
            } catch (error) {
                console.error('Ошибка сохранения прогресса:', error);
            }
        }
        
        function renderContent() {
            const topic = topics[currentTopicIndex];
            const container = document.getElementById('contentContainer');
            
            let html = `
                <div class="intro-section">
                    <h3>${topic.intro.title}</h3>
                    ${topic.intro.content}
                </div>
                
                <div class="tests-section">
                    <h3 style="margin-bottom: 15px;">📝 Проверь себя!</h3>

                        <button class="difficulty-btn medium" onclick="setDifficulty('medium')">🌿 Средние</button>

                        <button class="submit-btn" onclick="checkAnswers()">✅ Проверить ответы</button>
                    </div>
                    <div id="resultMessage" class="result-message" style="display: none;"></div>
                </div>
            `;
            
            container.innerHTML = html;
            renderQuestions();
        }
        
        // Инициализация Supabase
        async function initSupabase() {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase инициализирован');
                await loadAnswersFromSupabase();
            } else {
                await new Promise(resolve => setTimeout(resolve, 500));
                await initSupabase();
            }
        }
        
        // Загрузка Supabase JS
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = () => {
            console.log('Supabase JS загружен');
            initSupabase();
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
