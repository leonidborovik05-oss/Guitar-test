<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задания | Студия гитары</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(90deg, #1e1e2f, #2a2a40); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .logo span { color: #f0b90b; }
        .user-info { display: flex; align-items: center; gap: 25px; }
        .user-name { background: #3a3a55; padding: 8px 20px; border-radius: 40px; font-weight: 500; }
        .back-btn { background: #6c757d; color: white; padding: 8px 20px; border-radius: 40px; text-decoration: none; font-weight: 500; }
        .main-container { display: flex; max-width: 1400px; margin: 20px auto; padding: 0 20px; gap: 20px; min-height: calc(100vh - 100px); }
        .topics-panel { width: 300px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .topics-panel h3 { color: #1e1e2f; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #f0b90b; }
        .topic-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
        .topic-btn { background: #f8f9fc; border: none; padding: 12px 15px; text-align: left; border-radius: 12px; cursor: pointer; font-size: 0.95em; font-weight: 500; color: #555; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .topic-btn:hover { background: #e9ecef; transform: translateX(5px); }
        .topic-btn.active { background: #1e1e2f; color: white; }
        .topic-progress { background: #28a745; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7em; }
        .topic-btn.active .topic-progress { background: white; color: #1e1e2f; }
        .content-panel { flex: 1; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .topic-header { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f0b90b; }
        .topic-header h2 { color: #1e1e2f; font-size: 1.8em; margin-bottom: 5px; }
        .topic-header p { color: #666; }
        .intro-section { background: #f8f9fc; border-radius: 20px; padding: 25px; margin-bottom: 30px; border-left: 5px solid #f0b90b; }
        .intro-section h3 { color: #1e1e2f; margin-bottom: 15px; font-size: 1.4em; }
        .intro-section p { color: #333; line-height: 1.6; margin-bottom: 15px; }
        .intro-section ul, .intro-section ol { margin-left: 25px; margin-bottom: 15px; }
        .intro-section li { margin: 8px 0; line-height: 1.5; }
        .intro-section .note { background: #fff9e6; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 3px solid #ffc107; }
        .difficulty-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .difficulty-btn { padding: 8px 20px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .difficulty-btn.easy { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .difficulty-btn.easy.active { background: #28a745; color: white; }
        .difficulty-btn.medium { background: #fff8e1; color: #f57c00; border: 1px solid #ffe082; }
        .difficulty-btn.medium.active { background: #ffc107; color: #1e1e2f; }
        .difficulty-btn.hard { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .difficulty-btn.hard.active { background: #dc3545; color: white; }
        .difficulty-btn.all { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .difficulty-btn.all.active { background: #1e1e2f; color: white; }
        .question-block { background: #f8f9fc; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .question-text { font-size: 1.1em; font-weight: 600; color: #1e1e2f; margin-bottom: 15px; }
        .answers-list { display: flex; flex-direction: column; gap: 10px; }
        .answer-item { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 12px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .answer-item:hover { background: #e3f2fd; border-color: #2196f3; }
        .answer-item.selected { background: #e3f2fd; border-color: #2196f3; }
        .answer-marker { width: 28px; height: 28px; border-radius: 50%; background: white; border: 2px solid #2196f3; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2196f3; }
        .answer-item.selected .answer-marker { background: #2196f3; color: white; }
        .answer-text { font-size: 1em; color: #333; flex: 1; }
        .submit-section { margin-top: 30px; text-align: center; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(40,167,69,0.3); }
        .result-message { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 500; }
        .result-message.success { background: #d4edda; color: #155724; }
        .result-message.error { background: #f8d7da; color: #721c24; }
        .footer-links { margin-top: 30px; text-align: right; border-top: 1px solid #eaeef2; padding-top: 20px; }
        .footer-links a { color: #1e1e2f; text-decoration: none; border-bottom: 1px dashed #aaa; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .topics-panel { width: 100%; position: static; } .topic-list { flex-direction: row; flex-wrap: wrap; } .topic-btn { flex: 1; min-width: 150px; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🎸 Guitar<span>Studio</span></div>
        <div class="user-info">
            <div class="user-name" id="currentUserDisplay">Загрузка...</div>
            <a href="student-cabinet.html" class="back-btn">← В кабинет</a>
            <a href="login.html" class="back-btn">Выйти</a>
        </div>
    </header>
    <div class="main-container">
        <div class="topics-panel"><h3>📚 Темы заданий</h3><div id="topicList" class="topic-list"></div></div>
        <div class="content-panel">
            <div class="topic-header"><h2 id="topicTitle">Загрузка...</h2><p id="topicDescription"></p></div>
            <div id="contentContainer"></div>
            <div class="footer-links"><a href="student-cabinet.html">← Назад в кабинет</a></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const userLogin = localStorage.getItem('currentUserLogin') || 'LeonidzasFire23457';
            const userName = localStorage.getItem('currentUserName') || 'Ученик';
            document.getElementById('currentUserDisplay').textContent = localStorage.getItem('currentUserDisplay') || '👨‍🎓 ' + userName;
            
            const topics = [
                { id: 0, name: "🎸 Всё о гитаре", description: "Строение гитары, история", intro: "<p><strong>Гитара</strong> — струнный щипковый инструмент.</p><h4>🎵 Строение</h4><ul><li>Дека — корпус</li><li>Гриф с ладами</li><li>Головка с колками</li><li>6 струн</li></ul>", easy: [{text:"Сколько струн у классической гитары?",options:["4","5","6","7"],correct:2},{text:"Как называется приспособление для изменения тональности?",options:["Медиатор","Каподастр","Подставка","Сурдина"],correct:1},{text:"Какой строй у классической гитары?",options:["EADGBe","EADGCF","DGCFAD","EBGDAE"],correct:0}], medium: [{text:"Что обозначает буква 'C' в аккордах?",options:["До","Ре","Ми","Соль"],correct:0},{text:"Как называется техника игры пальцами?",options:["Бой","Перебор","Свип","Тэппинг"],correct:1},{text:"Какая струна самая тонкая?",options:["Первая","Третья","Шестая","Все одинаковые"],correct:0}], hard: [{text:"Что такое лад на гитаре?",options:["Струна","Промежуток между порожками","Колок","Дека"],correct:1},{text:"Какой аккорд обозначается 'Am'?",options:["Ля мажор","Ля минор","До мажор","Ми минор"],correct:1},{text:"Для чего нужен медиатор?",options:["Зажимать струны","Настраивать гитару","Защипывать струны","Держать ноты"],correct:2}] },
                { id: 1, name: "🎵 Аккорды и тональности", description: "Построение аккордов", intro: "<p><strong>Аккорд</strong> — звучание трёх и более нот.</p><p><strong>Тональность</strong> — высотное положение лада.</p>", easy: [{text:"Какой аккорд состоит из нот: до, ми, соль?",options:["C","Cm","C7","Cmaj7"],correct:0},{text:"Какой аккорд обозначается 'Dm'?",options:["Ре мажор","Ре минор","Соль минор","Ля минор"],correct:1},{text:"Какой аккорд является тоникой в тональности C-dur?",options:["C","G","Am","F"],correct:0}], medium: [{text:"Какой аккорд является доминантсептаккордом в тональности C-dur?",options:["C7","D7","G7","F7"],correct:2},{text:"Какой аккорд обозначается 'F#m'?",options:["Фа-диез мажор","Фа-диез минор","Фа мажор","Фа минор"],correct:1},{text:"Какой аккорд является тоникой в тональности G-dur?",options:["G","C","D","Em"],correct:0}], hard: [{text:"Что означает цифра '7' в аккорде C7?",options:["Септима","Седьмой лад","Семь струн","Седьмая ступень"],correct:0},{text:"Какой лад является параллельным минором для C-dur?",options:["Am","Em","Dm","Gm"],correct:0},{text:"Что означает обозначение 'sus4' в аккорде?",options:["Задержанный аккорд","Уменьшённый аккорд","Увеличенный аккорд","Септаккорд"],correct:0}] }
            ];
            for (let i = 2; i <= 9; i++) { topics.push({ id: i, name: `Тема ${i+1}`, description: "Описание темы", intro: "<p>Вступление</p>", easy: [], medium: [], hard: [] }); }
            
            let currentTopicIndex = 0, currentDifficulty = 'all', userAnswers = {};
            async function loadAnswers() { const { data } = await _supabase.from('tasks_answers').select('answers').eq('student_login', userLogin); if (data && data[0]) userAnswers = data[0].answers || {}; updateProgress(); renderContent(); }
            async function saveAnswers() { await _supabase.from('tasks_answers').upsert([{ student_login: userLogin, answers: userAnswers }]); }
            function updateProgress() { let html = ''; topics.forEach((t, i) => { let c = Object.values(userAnswers[i] || {}).filter(v => v !== null && v !== undefined).length; html += `<button class="topic-btn ${i === currentTopicIndex ? 'active' : ''}" onclick="switchTopic(${i})"><span>${t.name}</span><span class="topic-progress">${c}/9</span></button>`; }); document.getElementById('topicList').innerHTML = html; document.getElementById('topicTitle').textContent = topics[currentTopicIndex].name; document.getElementById('topicDescription').textContent = topics[currentTopicIndex].description; }
            window.switchTopic = function(i) { currentTopicIndex = i; currentDifficulty = 'all'; updateProgress(); renderContent(); };
            function renderContent() {
                const t = topics[currentTopicIndex];
                let html = `<div class="intro-section"><h3>📖 Вступление</h3>${t.intro}</div><div class="tests-section"><h3 style="margin-bottom:15px;">📝 Проверь себя!</h3><div class="difficulty-filters"><button class="difficulty-btn all active" onclick="setDifficulty('all')">Все</button><button class="difficulty-btn easy" onclick="setDifficulty('easy')">🌱 Лёгкие</button><button class="difficulty-btn medium" onclick="setDifficulty('medium')">🌿 Средние</button><button class="difficulty-btn hard" onclick="setDifficulty('hard')">🌳 Сложные</button></div><div id="questionsContainer"></div><div class="submit-section"><button class="submit-btn" onclick="checkAnswers()">✅ Проверить</button></div><div id="resultMessage" class="result-message" style="display:none;"></div></div>`;
                document.getElementById('contentContainer').innerHTML = html;
                renderQuestions();
            }
            window.setDifficulty = function(d) { currentDifficulty = d; document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active')); document.querySelector(`.difficulty-btn.${d}`).classList.add('active'); renderQuestions(); };
            function renderQuestions() {
                const t = topics[currentTopicIndex];
                let qList = [];
                if (currentDifficulty === 'all') qList = [...t.easy.map((q,i)=>({...q,globalIdx:i})), ...t.medium.map((q,i)=>({...q,globalIdx:3+i})), ...t.hard.map((q,i)=>({...q,globalIdx:6+i}))];
                else if (currentDifficulty === 'easy') qList = t.easy.map((q,i)=>({...q,globalIdx:i}));
                else if (currentDifficulty === 'medium') qList = t.medium.map((q,i)=>({...q,globalIdx:3+i}));
                else qList = t.hard.map((q,i)=>({...q,globalIdx:6+i}));
                let html = '';
                qList.forEach((q, idx) => {
                    const saved = userAnswers[currentTopicIndex]?.[q.globalIdx];
                    html += `<div class="question-block"><div class="question-text">${idx+1}. ${q.text}</div><div class="answers-list" data-qidx="${q.globalIdx}">${q.options.map((opt, oi) => `<div class="answer-item ${saved === oi ? 'selected' : ''}" onclick="selectAnswer(${currentTopicIndex}, ${q.globalIdx}, ${oi})"><div class="answer-marker">${String.fromCharCode(65+oi)}</div><div class="answer-text">${opt}</div></div>`).join('')}</div></div>`;
                });
                document.getElementById('questionsContainer').innerHTML = html;
            }
            window.selectAnswer = function(tid, qidx, aidx) { if (!userAnswers[tid]) userAnswers[tid] = {}; userAnswers[tid][qidx] = aidx; saveAnswers(); updateProgress(); renderQuestions(); };
            window.checkAnswers = function() {
                const t = topics[currentTopicIndex];
                let qList = [];
                if (currentDifficulty === 'all') qList = [...t.easy.map((q,i)=>({...q,globalIdx:i})), ...t.medium.map((q,i)=>({...q,globalIdx:3+i})), ...t.hard.map((q,i)=>({...q,globalIdx:6+i}))];
                else if (currentDifficulty === 'easy') qList = t.easy.map((q,i)=>({...q,globalIdx:i}));
                else if (currentDifficulty === 'medium') qList = t.medium.map((q,i)=>({...q,globalIdx:3+i}));
                else qList = t.hard.map((q,i)=>({...q,globalIdx:6+i}));
                let correct = 0;
                qList.forEach(q => { if (userAnswers[currentTopicIndex]?.[q.globalIdx] === q.correct) correct++; });
                const resDiv = document.getElementById('resultMessage');
                resDiv.style.display = 'block';
                resDiv.className = 'result-message ' + (correct === qList.length ? 'success' : (correct >= qList.length*0.7 ? 'success' : 'error'));
                resDiv.innerHTML = `<strong>${correct}/${qList.length} правильных ответов (${Math.round(correct/qList.length*100)}%)</strong><br>${correct === qList.length ? '🎉 Отлично!' : 'Рекомендуем повторить'}`;
            };
            loadAnswers();
        })();
    </script>
</body>
</html>
