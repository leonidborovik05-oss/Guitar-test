<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат группы | Студия гитары</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1e1e2f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .group-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .back-btn { background: #6c757d; color: white; padding: 8px 20px; border-radius: 40px; text-decoration: none; }
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 1000px; margin: 20px auto; width: 100%; padding: 0 20px; }
        .messages-area { flex: 1; background: white; border-radius: 20px; padding: 20px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; flex-direction: column; max-width: 70%; }
        .message.own { align-self: flex-end; }
        .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 0.9em; }
        .message-sender { font-weight: 600; }
        .message-time { color: #999; }
        .message-content { background: #f0f2f5; padding: 12px 15px; border-radius: 18px; }
        .message.own .message-content { background: #1e1e2f; color: white; }
        .message.teacher .message-content { background: #ffc107; color: #1e1e2f; }
        .input-area { display: flex; gap: 10px; background: white; padding: 15px; border-radius: 50px; }
        .message-input { flex: 1; border: none; padding: 12px 20px; background: #f0f2f5; border-radius: 40px; outline: none; }
        .send-btn { background: #28a745; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.2em; }
        .system-message { text-align: center; color: #999; padding: 10px; background: #f8f9fc; border-radius: 20px; }
        .library-link { position: fixed; bottom: 100px; right: 30px; background: #17a2b8; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 GuitarStudio</div>
        <div class="group-info">
            <span class="group-name" id="groupName">Загрузка...</span>
            <a href="javascript:history.back()" class="back-btn">← Назад</a>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="system-message">⏳ Загрузка сообщений...</div>
        </div>
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="Напишите сообщение..." onkeypress="checkEnter(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
    <a href="#" class="library-link" id="libraryLink">📁 Библиотека группы</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
            
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('groupId');
            
            const userLogin = localStorage.getItem('currentUserLogin') || 'LeonidzasFire23457';
            const userName = localStorage.getItem('currentUserName') || 'Ученик';
            const isTeacher = userLogin === 'EvgenyaGuitara01543';
            
            let currentGroup = null;
            let messages = [];
            
            async function loadGroup() {
                const { data } = await _supabase.from('groups').select('*').eq('id', groupId).single();
                if (!data) {
                    document.getElementById('messagesArea').innerHTML = '<div class="system-message">❌ Группа не найдена</div>';
                    return;
                }
                currentGroup = data;
                document.getElementById('groupName').textContent = currentGroup.name;
                document.getElementById('libraryLink').href = `group-library.html?groupId=${groupId}`;
                await loadMessages();
            }
            
            async function loadMessages() {
                const { data } = await _supabase.from('group_messages').select('*').eq('group_id', groupId).order('id', { ascending: true });
                messages = data || [];
                renderMessages();
            }
            
            function renderMessages() {
                const container = document.getElementById('messagesArea');
                if (!messages.length) {
                    container.innerHTML = '<div class="system-message">💬 Нет сообщений</div>';
                    return;
                }
                let html = '';
                for (let msg of messages) {
                    const isOwn = msg.sender === userLogin;
                    const isTeacherMsg = msg.sender === 'EvgenyaGuitara01543';
                    html += `<div class="message ${isOwn ? 'own' : ''} ${isTeacherMsg ? 'teacher' : ''}">
                        <div class="message-header">
                            <span class="message-sender">${escapeHtml(msg.sender_name)}</span>
                            <span class="message-time">${msg.date}</span>
                        </div>
                        <div class="message-content">${escapeHtml(msg.text)}</div>
                    </div>`;
                }
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            }
            
            async function sendMessage() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text) return;
                
                const message = {
                    group_id: parseInt(groupId),
                    sender: userLogin,
                    sender_name: userName,
                    text: text,
                    date: new Date().toLocaleString(),
                    read: false
                };
                
                const { error } = await _supabase.from('group_messages').insert([message]);
                if (error) { alert('Ошибка отправки'); return; }
                input.value = '';
                await loadMessages();
            }
            
            window.checkEnter = function(e) {
                if (e.key === 'Enter') sendMessage();
            };
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            loadGroup();
            
            // Подписка на новые сообщения
            _supabase.channel(`group_${groupId}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'group_messages', filter: `group_id=eq.${groupId}` }, () => loadMessages())
                .subscribe();
        })();
    </script>
</body>
</html>
