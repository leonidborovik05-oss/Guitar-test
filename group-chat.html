<script>
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get('groupId');
    
    // Константы для учителя
    const TEACHER_LOGIN = "EvgenyaGuitara01543";
    const TEACHER_NAME = "Евгения (Учитель)";
    
    // ОПРЕДЕЛЯЕМ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ
    let currentUser = {
        login: '',
        name: '',
        role: 'student'
    };
    
    // Проверяем, заходил ли учитель
    const isTeacherLoggedIn = localStorage.getItem('teacherLoggedIn') === 'true';
    
    if (isTeacherLoggedIn) {
        currentUser = {
            login: TEACHER_LOGIN,
            name: TEACHER_NAME,
            role: 'teacher'
        };
    } else {
        // Иначе ученик Леонид
        currentUser = {
            login: 'LeonidzasFire23457',
            name: 'Леонид Зас',
            role: 'student'
        };
    }
    
    // Сохраняем в sessionStorage
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    
    // Загружаем группы
    let groups = JSON.parse(localStorage.getItem('groups')) || [];
    const currentGroup = groups.find(g => g.id == groupId);
    
    if (!currentGroup) {
        alert('Группа не найдена');
        window.location.href = currentUser.role === 'teacher' ? 'teacher-cabinet.html' : 'student-cabinet.html';
    }
    
    document.getElementById('groupName').textContent = currentGroup.name;
    document.getElementById('memberCount').textContent = `${currentGroup.members ? currentGroup.members.length : 0} уч.`;
    document.getElementById('libraryLink').href = `group-library.html?groupId=${groupId}`;
    
    // Загружаем сообщения
    let messages = JSON.parse(localStorage.getItem(`group_messages_${groupId}`)) || [];
    
    // Добавляем системное сообщение о создании группы, если его нет
    if (messages.length === 0) {
        messages.push({
            id: Date.now(),
            type: 'system',
            text: `Группа "${currentGroup.name}" создана`,
            date: currentGroup.createdAt || new Date().toLocaleString()
        });
        localStorage.setItem(`group_messages_${groupId}`, JSON.stringify(messages));
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        let html = '';
        
        messages.forEach(msg => {
            if (msg.type === 'system') {
                html += `<div class="system-message">${msg.text} • ${msg.date}</div>`;
            } else {
                const isOwn = msg.sender === currentUser.login;
                const isTeacher = msg.sender === TEACHER_LOGIN;
                html += `
                    <div class="message ${isOwn ? 'own' : ''} ${isTeacher ? 'teacher' : ''}">
                        <div class="message-header">
                            <span class="message-sender">
                                ${msg.senderName}
                                ${isTeacher ? '<span class="teacher-badge">👑</span>' : ''}
                            </span>
                            <span class="message-time">${msg.date}</span>
                        </div>
                        <div class="message-content">${msg.text}</div>
                    </div>
                `;
            }
        });
        
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text) return;
        
        const message = {
            id: Date.now(),
            type: 'message',
            sender: currentUser.login,
            senderName: currentUser.name,
            groupId: groupId,
            groupName: currentGroup.name,
            text: text,
            date: new Date().toLocaleString(),
            read: false
        };
        
        messages.push(message);
        localStorage.setItem(`group_messages_${groupId}`, JSON.stringify(messages));
        
        // Сохраняем также в общий список для уведомлений учителя
        let allMessages = JSON.parse(localStorage.getItem('groupMessages')) || [];
        allMessages.push(message);
        localStorage.setItem('groupMessages', JSON.stringify(allMessages));
        
        input.value = '';
        renderMessages();
    }
    
    function checkEnter(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }
    
    renderMessages();
    setInterval(() => {
        // Проверяем новые сообщения каждые 2 секунды
        const newMessages = JSON.parse(localStorage.getItem(`group_messages_${groupId}`)) || [];
        if (JSON.stringify(newMessages) !== JSON.stringify(messages)) {
            messages = newMessages;
            renderMessages();
        }
    }, 2000);
</script>
