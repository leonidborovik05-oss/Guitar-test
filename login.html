<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в студию</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #43C6AC 0%, #191654 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: rgba(255,255,255,0.98); padding: 40px 35px; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; }
        h2 { margin-bottom: 30px; color: #191654; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        input { width: 100%; padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1em; }
        .btn-login { width: 100%; padding: 16px; background: linear-gradient(45deg, #191654, #43C6AC); color: white; border: none; border-radius: 12px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .error-message { background: #ffebee; color: #c62828; padding: 12px; border-radius: 10px; margin-top: 20px; display: none; }
        .back-link { display: inline-block; margin-top: 25px; color: #191654; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в студию</h2>
        <div class="input-group"><label>👤 Логин</label><input type="text" id="username" placeholder="Введите логин"></div>
        <div class="input-group"><label>🔑 Пароль</label><input type="password" id="password" placeholder="Введите пароль"></div>
        <button class="btn-login" onclick="checkLogin()">Войти</button>
        <div id="errorMessage" class="error-message">❌ Неверный логин или пароль</div>
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            window.checkLogin = async function() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const errorDiv = document.getElementById('errorMessage');
                if (!username || !password) { errorDiv.style.display = 'block'; errorDiv.innerText = '❌ Поля не могут быть пустыми'; return; }
                
                const { data: teacher } = await _supabase.from('teachers').select('*').eq('login', username).eq('password', password);
                if (teacher && teacher.length > 0) {
                    localStorage.setItem('currentUserRole', 'teacher');
                    localStorage.setItem('currentUserLogin', teacher[0].login);
                    localStorage.setItem('currentUserName', teacher[0].name);
                    localStorage.setItem('currentUserDisplay', '👩‍🏫 ' + teacher[0].name + ' (Учитель)');
                    window.location.href = 'teacher-cabinet.html';
                    return;
                }
                
                const { data: student } = await _supabase.from('students').select('*').eq('login', username).eq('password', password);
                if (student && student.length > 0) {
                    localStorage.setItem('currentUserRole', 'student');
                    localStorage.setItem('currentUserLogin', student[0].login);
                    localStorage.setItem('currentUserName', student[0].name);
                    localStorage.setItem('currentUserDisplay', '👨‍🎓 ' + student[0].name + ' (Ученик)');
                    window.location.href = 'student-cabinet.html';
                    return;
                }
                
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Неверный логин или пароль';
            };
        })();
    </script>
</body>
</html>
