<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в студию</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #43C6AC 0%, #191654 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 {
            margin-bottom: 30px;
            color: #191654;
            font-size: 2em;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #43C6AC;
            box-shadow: 0 0 0 4px rgba(67, 198, 172, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #191654, #43C6AC);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 15px;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 500;
            border-left: 5px solid #c62828;
            text-align: left;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #191654;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px dotted #43C6AC;
            padding-bottom: 3px;
        }
        .back-link:hover {
            color: #43C6AC;
        }
        .hint {
            margin-top: 20px;
            font-size: 0.85em;
            color: #888;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в студию</h2>
        
        <div class="input-group">
            <label>👤 Логин</label>
            <input type="text" id="username" placeholder="Введите логин" autocomplete="off">
        </div>

        <div class="input-group">
            <label>🔑 Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>

        <button class="btn-login" onclick="checkLogin()">Войти</button>

        <div id="errorMessage" class="error-message">
            ❌ Неверный логин или пароль. Попробуйте снова.
        </div>

        <a href="index.html" class="back-link">← Вернуться на главную</a>
        
        <div class="hint">
            <strong>Тестовые данные:</strong><br>
            👩‍🏫 Учитель: EvgenyaGuitara01543 / 0019234509<br>
            👨‍🎓 Ученик: LeonidzasFire23457 / 11265497
        </div>
    </div>

    <script>
        function checkLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const teacherUsername = "EvgenyaGuitara01543";
            const teacherPassword = "0019234509";
            
            const studentUsername = "LeonidzasFire23457";
            const studentPassword = "11265497";

            const errorDiv = document.getElementById('errorMessage');

            if (username.trim() === "" || password.trim() === "") {
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Поля не могут быть пустыми.';
                return;
            }

            if (username === teacherUsername && password === teacherPassword) {
                localStorage.setItem('teacherLoggedIn', 'true');
                localStorage.setItem('currentUserLogin', teacherUsername);
                localStorage.setItem('currentUserName', 'Евгения (Учитель)');
                window.location.href = "teacher-cabinet.html"; 
            }
            else if (username === studentUsername && password === studentPassword) {
                localStorage.removeItem('teacherLoggedIn');
                localStorage.setItem('currentUserLogin', studentUsername);
                localStorage.setItem('currentUserName', 'Леонид Зас');
                window.location.href = "student-cabinet.html";
            }
            else {
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Неверный логин или пароль. Попробуйте снова.';
            }
        }
    </script>
</body>
</html>
