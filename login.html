<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в студию</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #43C6AC 0%, #191654 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 {
            margin-bottom: 30px;
            color: #191654;
            font-size: 2em;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 0.95em;
        }
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #43C6AC;
            box-shadow: 0 0 0 4px rgba(67, 198, 172, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #191654, #43C6AC);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 15px;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 500;
            border-left: 5px solid #c62828;
            text-align: left;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #191654;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 2px dotted #43C6AC;
            padding-bottom: 3px;
        }
        .back-link:hover {
            color: #43C6AC;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в студию</h2>
        
        <div class="input-group">
            <label>👤 Логин</label>
            <input type="text" id="username" placeholder="Введите логин" autocomplete="off">
        </div>

        <div class="input-group">
            <label>🔑 Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>

        <button class="btn-login" onclick="checkLogin()">Войти</button>

        <div id="errorMessage" class="error-message">
            ❌ Неверный логин или пароль. Попробуйте снова.
        </div>

        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>

    <script>
        // Supabase конфигурация
        const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
        
        let supabaseClient = null;
        
        async function initSupabase() {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase инициализирован');
            } else {
                await new Promise(resolve => setTimeout(resolve, 500));
                if (window.supabase) {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }
            }
        }
        
        async function checkLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.querySelector('.btn-login');
            
            if (username === "" || password === "") {
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Поля не могут быть пустыми.';
                return;
            }
            
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = 'Вход... <span class="loading"></span>';
            loginBtn.disabled = true;
            errorDiv.style.display = 'none';
            
            try {
                if (!supabaseClient) {
                    await initSupabase();
                }
                
                // Сначала проверяем, не учитель ли это
                const { data: teacher, error: teacherError } = await supabaseClient
                    .from('teachers')
                    .select('*')
                    .eq('login', username)
                    .eq('password', password);
                
                if (teacherError) {
                    console.error('Ошибка запроса учителя:', teacherError);
                }
                
                if (teacher && teacher.length > 0) {
                    // Это учитель
                    localStorage.setItem('currentUserRole', 'teacher');
                    localStorage.setItem('currentUserLogin', teacher[0].login);
                    localStorage.setItem('currentUserName', teacher[0].name);
                    localStorage.setItem('currentUserDisplay', '👩‍🏫 ' + teacher[0].name + ' (Учитель)');
                    window.location.href = 'teacher-cabinet.html';
                    return;
                }
                
                // Проверяем ученика
                const { data: student, error: studentError } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('login', username)
                    .eq('password', password);
                
                if (studentError) {
                    console.error('Ошибка запроса ученика:', studentError);
                }
                
                if (student && student.length > 0) {
                    // Это ученик
                    localStorage.setItem('currentUserRole', 'student');
                    localStorage.setItem('currentUserLogin', student[0].login);
                    localStorage.setItem('currentUserName', student[0].name);
                    localStorage.setItem('currentUserDisplay', '👨‍🎓 ' + student[0].name + ' (Ученик)');
                    window.location.href = 'student-cabinet.html';
                    return;
                }
                
                // Если ни учитель, ни ученик не найден
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Неверный логин или пароль. Попробуйте снова.';
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
                
            } catch (err) {
                console.error('Ошибка:', err);
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ Ошибка подключения к серверу. Проверьте интернет.';
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }
        
        // Загружаем Supabase JS библиотеку
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = () => {
            console.log('Supabase JS загружен');
            initSupabase();
        };
        document.head.appendChild(script);
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkLogin();
            }
        });
    </script>
</body>
</html>
