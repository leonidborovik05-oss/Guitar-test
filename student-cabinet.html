<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет ученика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header { background: #1e1e2f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .user-info { display: flex; gap: 20px; align-items: center; }
        .user-name { background: #3a3a55; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #dc3545; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .greeting-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; border-left: 8px solid #f0b90b; }
        .action-buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { background: #1e1e2f; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; text-decoration: none; display: inline-block; }
        .action-btn.tasks { background: #28a745; }
        .action-btn.groups { background: #6f42c1; }
        .action-btn.library { background: #17a2b8; }
        .students-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .section-title { font-size: 1.4em; margin-bottom: 20px; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .group-card { background: #f8f9fc; border-radius: 15px; padding: 20px; border-left: 5px solid #6f42c1; cursor: pointer; }
        .group-name { font-size: 1.2em; font-weight: 600; }
        .group-members { color: #666; margin: 10px 0; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .footer-links { margin-top: 30px; text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 GuitarStudio</div>
        <div class="user-info">
            <div class="user-name" id="currentUserDisplay">Загрузка...</div>
            <a href="login.html" class="logout-btn">Выйти</a>
        </div>
    </div>

    <div class="main-container">
        <div class="greeting-card">
            <h2 id="greetingTitle">Привет!</h2>
            <p>Твои группы и задания</p>
            <div class="action-buttons">
                <a href="tasks.html" class="action-btn tasks">📚 Задания</a>
                <a href="#" class="action-btn groups" id="groupsBtn">👥 Мои группы</a>
                <a href="library-student.html" class="action-btn library">📹 Библиотека</a>
            </div>
        </div>
        <div class="students-section">
            <div class="section-title">👥 Мои группы</div>
            <div id="groupsContainer" class="students-grid">Загрузка...</div>
        </div>
        <div class="footer-links"><a href="index.html">🏠 На главную</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://lpiczwspyxmtncxodyxr.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwaWN6d3NweXhtdG5jeG9keXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTAxNjEsImV4cCI6MjA5MjA2NjE2MX0.Q1FUwxGIabDi3rMsBC63caJ-QZt3nwixuXccXPTgqEw';
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const userLogin = localStorage.getItem('currentUserLogin') || 'LeonidzasFire23457';
            const userName = localStorage.getItem('currentUserName') || 'Ученик';
            document.getElementById('currentUserDisplay').textContent = localStorage.getItem('currentUserDisplay') || '👨‍🎓 ' + userName;
            document.getElementById('greetingTitle').textContent = `Привет, ${userName}!`;
            
            async function loadGroups() {
                const { data: memberships } = await _supabase.from('group_members').select('group_id').eq('student_login', userLogin);
                if (!memberships || !memberships.length) { document.getElementById('groupsContainer').innerHTML = '<div class="empty-state">👥 Вы пока не состоите в группах</div>'; return; }
                const { data: groups } = await _supabase.from('groups').select('*').in('id', memberships.map(m => m.group_id));
                if (!groups || !groups.length) { document.getElementById('groupsContainer').innerHTML = '<div class="empty-state">👥 Вы пока не состоите в группах</div>'; return; }
                let html = '';
                for (let g of groups) {
                    html += `<div class="group-card" onclick="window.location.href='group-chat.html?groupId=${g.id}'"><div class="group-name">${escapeHtml(g.name)}</div><div class="group-members">${escapeHtml(g.description || 'Нет описания')}</div><div class="group-members">👥 Участников: ${g.members ? g.members.length : 0}</div></div>`;
                }
                document.getElementById('groupsContainer').innerHTML = html;
            }
            function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
            loadGroups();
        })();
    </script>
</body>
</html>
