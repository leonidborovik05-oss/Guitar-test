<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет учителя | Студия гитары</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header { background: #1e1e2f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .user-info { display: flex; gap: 20px; align-items: center; }
        .user-name { background: #3a3a55; padding: 8px 20px; border-radius: 40px; }
        .logout-btn { background: #dc3545; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .greeting-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; border-left: 8px solid #f0b90b; }
        .action-buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { background: #1e1e2f; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; text-decoration: none; display: inline-block; }
        .action-btn.add-student { background: #28a745; }
        .action-btn.add-note { background: #ffc107; color: black; }
        .action-btn.groups { background: #6f42c1; }
        .action-btn.library { background: #17a2b8; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 2em; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; cursor: pointer; }
        
        .students-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .section-title { font-size: 1.4em; margin-bottom: 20px; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .student-card { background: #f8f9fc; border-radius: 15px; padding: 20px; border: 1px solid #eaeef2; }
        .student-name { font-size: 1.3em; font-weight: 600; }
        .student-login { color: #666; font-size: 0.9em; margin: 10px 0; }
        .student-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .view-student-btn, .progress-student-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .view-student-btn { background: #1e1e2f; color: white; }
        .progress-student-btn { background: #17a2b8; color: white; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .footer-links { margin-top: 30px; text-align: right; }
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .group-card { background: white; border-radius: 15px; padding: 20px; border-left: 5px solid #6f42c1; }
        .group-name { font-size: 1.2em; font-weight: 600; }
        .group-members { color: #666; margin: 10px 0; }
        .group-actions { display: flex; gap: 10px; margin-top: 15px; }
        .group-btn { flex: 1; background: #1e1e2f; color: white; padding: 8px; border-radius: 8px; text-decoration: none; text-align: center; display: inline-block; }
        .group-btn.chat { background: #28a745; }
        .group-btn.library { background: #17a2b8; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 GuitarStudio</div>
        <div class="user-info">
            <div class="user-name" id="currentUserDisplay">Загрузка...</div>
            <a href="login.html" class="logout-btn">Выйти</a>
        </div>
    </div>

    <div class="main-container">
        <div class="greeting-card">
            <h2 id="greetingTitle">Здравствуйте!</h2>
            <p>Панель управления учениками</p>
            <div class="action-buttons">
                <button class="action-btn add-student" id="addStudentBtn">➕ Добавить ученика</button>
                <button class="action-btn add-note" id="addNoteBtn">📝 Добавить заметку</button>
                <button class="action-btn groups" id="createGroupBtn">👥 Создать группу</button>
                <a href="library-teacher.html" class="action-btn library">📹 Библиотека</a>
            </div>
        </div>

        <div class="students-section">
            <div class="section-title">👥 Мои группы</div>
            <div id="groupsContainer" class="groups-grid">Загрузка...</div>
        </div>

        <div class="students-section">
            <div class="section-title">👥 Все ученики</div>
            <div id="studentsContainer" class="students-grid">Загрузка...</div>
        </div>

        <!-- Модалки -->
        <div id="addStudentModal" class="modal">
            <div class="modal-content">
                <div class="modal-header"><h3>➕ Добавить ученика</h3><button class="close-btn" onclick="closeModal('addStudentModal')">&times;</button></div>
                <div class="form-group"><label>Логин</label><input type="text" id="studentLogin" placeholder="login"></div>
                <div class="form-group"><label>Пароль</label><input type="text" id="studentPassword" placeholder="password"></div>
                <div class="form-group"><label>Имя</label><input type="text" id="studentName" placeholder="Имя"></div>
                <button class="btn-save" id="saveStudentBtn">Добавить</button>
            </div>
        </div>

        <div id="addNoteModal" class="modal">
            <div class="modal-content">
                <div class="modal-header"><h3>📝 Добавить заметку</h3><button class="close-btn" onclick="closeModal('addNoteModal')">&times;</button></div>
                <div class="form-group"><label>Ученик</label><select id="noteStudentSelect"></select></div>
                <div class="form-group"><label>Тема</label><input type="text" id="noteTitle"></div>
                <div class="form-group"><label>Текст</label><textarea id="noteText"></textarea></div>
                <button class="btn-save" id="saveNoteBtn">Отправить</button>
            </div>
        </div>

        <div id="createGroupModal" class="modal">
            <div class="modal-content">
                <div class="modal-header"><h3>👥 Создать группу</h3><button class="close-btn" onclick="closeModal('createGroupModal')">&times;</button></div>
                <div class="form-group"><label>Название</label><input type="text" id="groupName"></div>
                <div class="form-group"><label>Описание</label><textarea id="groupDescription"></textarea></div>
                <div class="form-group"><label>Ученики</label><div id="studentCheckboxes" style="max-height:200px; overflow-y:auto; border:1px solid #ddd; border-radius:10px; padding:10px;"></div></div>
                <button class="btn-save" id="saveGroupBtn">Создать</button>
            </div>
        </div>

        <div class="footer-links"><a href="index.html">🏠 На главную</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            // Конфиг
            const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
            
            // Создаём клиент
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Данные
            let students = [];
            let groups = [];
            
            // DOM элементы
            const studentsContainer = document.getElementById('studentsContainer');
            const groupsContainer = document.getElementById('groupsContainer');
            const noteStudentSelect = document.getElementById('noteStudentSelect');
            const studentCheckboxes = document.getElementById('studentCheckboxes');
            
            // Отображение имени
            document.getElementById('currentUserDisplay').textContent = localStorage.getItem('currentUserDisplay') || '👩‍🏫 Евгения';
            document.getElementById('greetingTitle').textContent = `Здравствуйте, ${localStorage.getItem('currentUserName') || 'Евгения'}!`;
            
            // Загрузка учеников
            async function loadStudents() {
                const { data } = await _supabase.from('students').select('*').order('name');
                students = data || [];
                if (students.length === 0) {
                    studentsContainer.innerHTML = '<div class="empty-state">👥 Нет учеников</div>';
                    return;
                }
                let html = '';
                for (let s of students) {
                    html += `<div class="student-card">
                        <div class="student-name">${escapeHtml(s.name)}</div>
                        <div class="student-login">Логин: ${escapeHtml(s.login)}</div>
                        <div class="student-buttons">
                            <button class="view-student-btn" onclick="window.viewStudent('${s.login}')">📝 Заметки</button>
                            <button class="progress-student-btn" onclick="window.showProgress('${s.login}')">📊 Прогресс</button>
                        </div>
                    </div>`;
                }
                studentsContainer.innerHTML = html;
                
                // Обновляем select для заметок
                if (noteStudentSelect) {
                    noteStudentSelect.innerHTML = '<option value="">-- Выберите --</option>' + students.map(s => `<option value="${escapeHtml(s.login)}">${escapeHtml(s.name)}</option>`).join('');
                }
                
                // Обновляем чекбоксы для групп
                if (studentCheckboxes) {
                    studentCheckboxes.innerHTML = students.map(s => `<div style="margin-bottom: 8px;"><input type="checkbox" value="${escapeHtml(s.login)}" id="cb_${s.login}"> <label for="cb_${s.login}">${escapeHtml(s.name)}</label></div>`).join('');
                }
            }
            
            // Загрузка групп
            async function loadGroups() {
                const { data } = await _supabase.from('groups').select('*').order('created_at', { ascending: false });
                groups = data || [];
                if (groups.length === 0) {
                    groupsContainer.innerHTML = '<div class="empty-state">👥 Групп пока нет</div>';
                    return;
                }
                let html = '';
                for (let g of groups) {
                    const memberCount = g.members ? g.members.length : 0;
                    html += `<div class="group-card">
                        <div class="group-name">${escapeHtml(g.name)}</div>
                        <div class="group-members">${escapeHtml(g.description || 'Нет описания')}</div>
                        <div class="group-members">👥 Участников: ${memberCount}</div>
                        <div class="group-actions">
                            <a href="group-chat.html?groupId=${g.id}" class="group-btn chat">💬 Чат</a>
                            <a href="group-library.html?groupId=${g.id}" class="group-btn library">📁 Библиотека</a>
                        </div>
                    </div>`;
                }
                groupsContainer.innerHTML = html;
            }
            
            // Функции для кнопок
            window.viewStudent = function(login) {
                const s = students.find(s => s.login === login);
                if (s) {
                    alert(`👤 ${s.name}\nЛогин: ${s.login}\nПароль: ${s.password}`);
                } else {
                    alert('Ученик не найден');
                }
            };
            
            window.showProgress = function(login) {
                alert('📊 Прогресс ученика будет доступен позже');
            };
            
            // Модалки
            window.closeModal = function(id) {
                document.getElementById(id).classList.remove('active');
            };
            
            // Добавление ученика
            document.getElementById('addStudentBtn').onclick = () => document.getElementById('addStudentModal').classList.add('active');
            document.getElementById('saveStudentBtn').onclick = async () => {
                const login = document.getElementById('studentLogin').value.trim();
                const password = document.getElementById('studentPassword').value.trim();
                const name = document.getElementById('studentName').value.trim();
                if (!login || !password || !name) { alert('Заполните все поля'); return; }
                const { error } = await _supabase.from('students').insert([{ login, password, name }]);
                if (error) { alert('Ошибка: ' + error.message); return; }
                alert('✅ Ученик добавлен');
                window.closeModal('addStudentModal');
                document.getElementById('studentLogin').value = '';
                document.getElementById('studentPassword').value = '';
                document.getElementById('studentName').value = '';
                await loadStudents();
            };
            
            // Добавление заметки
            document.getElementById('addNoteBtn').onclick = () => {
                if (students.length === 0) { alert('Нет учеников'); return; }
                document.getElementById('addNoteModal').classList.add('active');
            };
            document.getElementById('saveNoteBtn').onclick = async () => {
                const studentLogin = noteStudentSelect.value;
                const title = document.getElementById('noteTitle').value.trim();
                const text = document.getElementById('noteText').value.trim();
                if (!studentLogin || !title || !text) { alert('Заполните все поля'); return; }
                const { error } = await _supabase.from('teacher_notes').insert([{
                    student_login: studentLogin,
                    title: title,
                    text: text,
                    date: new Date().toLocaleString(),
                    read: false
                }]);
                if (error) { alert('Ошибка: ' + error.message); return; }
                alert('✅ Заметка добавлена');
                window.closeModal('addNoteModal');
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteText').value = '';
            };
            
            // Создание группы
            document.getElementById('createGroupBtn').onclick = () => {
                if (students.length === 0) { alert('Нет учеников'); return; }
                document.getElementById('createGroupModal').classList.add('active');
            };
            document.getElementById('saveGroupBtn').onclick = async () => {
                const name = document.getElementById('groupName').value.trim();
                const description = document.getElementById('groupDescription').value.trim();
                const members = Array.from(document.querySelectorAll('#studentCheckboxes input:checked')).map(cb => cb.value);
                if (!name) { alert('Введите название группы'); return; }
                if (members.length === 0) { alert('Выберите хотя бы одного ученика'); return; }
                const { error } = await _supabase.from('groups').insert([{
                    name: name,
                    description: description,
                    created_by: 'EvgenyaGuitara01543',
                    created_at: new Date().toLocaleString(),
                    members: members
                }]);
                if (error) { alert('Ошибка: ' + error.message); return; }
                alert('✅ Группа создана');
                window.closeModal('createGroupModal');
                document.getElementById('groupName').value = '';
                document.getElementById('groupDescription').value = '';
                await loadGroups();
            };
            
            // Экранирование HTML
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            // Запуск
            loadStudents();
            loadGroups();
        })();
    </script>
</body>
</html>
