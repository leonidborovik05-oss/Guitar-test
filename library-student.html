<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека ученика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header { background: #1e1e2f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .user-info { display: flex; gap: 20px; align-items: center; }
        .user-name { background: #3a3a55; padding: 8px 20px; border-radius: 40px; }
        .back-btn { background: #6c757d; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .logout-btn { background: #dc3545; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .greeting-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; border-left: 8px solid #17a2b8; }
        .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .material-card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .material-preview { height: 180px; background: #1e1e2f; display: flex; align-items: center; justify-content: center; color: white; font-size: 3em; }
        .material-preview img { width: 100%; height: 100%; object-fit: cover; }
        .material-info { padding: 15px; }
        .material-title { font-weight: 600; font-size: 1.1em; margin-bottom: 8px; }
        .material-meta { display: flex; justify-content: space-between; color: #999; font-size: 0.85em; margin-top: 10px; }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .footer-links { margin-top: 30px; text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 GuitarStudio</div>
        <div class="user-info">
            <div class="user-name" id="currentUserDisplay">Загрузка...</div>
            <a href="student-cabinet.html" class="back-btn">← В кабинет</a>
            <a href="login.html" class="logout-btn">Выйти</a>
        </div>
    </div>
    <div class="main-container">
        <div class="greeting-card"><h1 id="greetingTitle">📹 Моя библиотека</h1><p>Материалы от учителя</p></div>
        <div id="materialsGrid" class="materials-grid">Загрузка...</div>
        <div class="footer-links"><a href="student-cabinet.html">← Назад</a></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://lpiczwspyxmtncxodyxr.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwaWN6d3NweXhtdG5jeG9keXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTAxNjEsImV4cCI6MjA5MjA2NjE2MX0.Q1FUwxGIabDi3rMsBC63caJ-QZt3nwixuXccXPTgqEw';
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const userLogin = localStorage.getItem('currentUserLogin') || 'LeonidzasFire23457';
            const userName = localStorage.getItem('currentUserName') || 'Ученик';
            document.getElementById('currentUserDisplay').textContent = localStorage.getItem('currentUserDisplay') || '👨‍🎓 ' + userName;
            document.getElementById('greetingTitle').textContent = `📹 Моя библиотека, ${userName}`;
            
            async function loadMaterials() {
                const { data } = await _supabase.from('library_materials').select('*').or(`student_login.eq.${userLogin},student_login.eq.ALL`).order('created_at', { ascending: false });
                const grid = document.getElementById('materialsGrid');
                if (!data || !data.length) { grid.innerHTML = '<div class="empty-state">📭 Материалов пока нет</div>'; return; }
                let html = '';
                for (let m of data) {
                    html += `<div class="material-card" onclick="window.open('${m.file_url}', '_blank')"><div class="material-preview">${m.type === 'video' ? '🎥' : `<img src="${m.file_url}">`}</div><div class="material-info"><div class="material-title">${escapeHtml(m.title)}</div><div>${escapeHtml(m.description)}</div><div class="material-meta"><span>📅 ${m.date}</span>${m.student_login === 'ALL' ? '<span>🌟 Для всех</span>' : ''}</div></div></div>`;
                }
                grid.innerHTML = html;
            }
            function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
            loadMaterials();
        })();
    </script>
</body>
</html>
