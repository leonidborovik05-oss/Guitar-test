<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека учителя</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header { background: #1e1e2f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8em; font-weight: bold; }
        .user-info { display: flex; gap: 20px; align-items: center; }
        .user-name { background: #3a3a55; padding: 8px 20px; border-radius: 40px; }
        .back-btn { background: #6c757d; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .logout-btn { background: #dc3545; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: white; }
        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .upload-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .upload-form { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-upload { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; }
        .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .material-card { background: white; border-radius: 15px; overflow: hidden; }
        .material-preview { height: 180px; background: #1e1e2f; display: flex; align-items: center; justify-content: center; color: white; font-size: 3em; }
        .material-preview img { width: 100%; height: 100%; object-fit: cover; }
        .material-info { padding: 15px; }
        .material-title { font-weight: 600; font-size: 1.1em; margin-bottom: 8px; }
        .material-meta { display: flex; justify-content: space-between; color: #999; font-size: 0.85em; margin-top: 10px; }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .error-message { background: #ffebee; color: #c62828; padding: 12px; border-radius: 10px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎸 GuitarStudio</div>
        <div class="user-info">
            <div class="user-name" id="currentUserDisplay">Загрузка...</div>
            <a href="teacher-cabinet.html" class="back-btn">← В кабинет</a>
            <a href="login.html" class="logout-btn">Выйти</a>
        </div>
    </div>

    <div class="main-container">
        <h1 style="margin-bottom: 20px;">📹 Библиотека материалов</h1>
        
        <div id="uploadError" class="error-message"></div>
        
        <div class="upload-section">
            <h3 style="margin-bottom: 20px;">📤 Загрузить материал</h3>
            <div class="upload-form">
                <div class="form-group">
                    <label>Тип</label>
                    <select id="materialType">
                        <option value="photo">📸 Фото</option>
                        <option value="video">🎥 Видео</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Файл</label>
                    <input type="file" id="materialFile" accept="image/*,video/*">
                </div>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="materialTitle" placeholder="Название">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="materialDescription" placeholder="Описание"></textarea>
                </div>
                <div class="form-group">
                    <label>Для кого</label>
                    <select id="materialStudent"></select>
                </div>
                <button class="btn-upload" id="uploadBtn">⬆️ Загрузить</button>
            </div>
        </div>

        <div id="materialsGrid" class="materials-grid">Загрузка...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://gvqxdbzsjamhrdjlbutt.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cXhkYnpzamFtaHJkamxidXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjI1NDIsImV4cCI6MjA5MDY5ODU0Mn0.5tx_Da1Zd82FUxa1M69fq_umlJVOnrKYphSjMlm7SeM';
            
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let students = [];
            let materials = [];
            
            document.getElementById('currentUserDisplay').textContent = localStorage.getItem('currentUserDisplay') || '👩‍🏫 Евгения';
            
            // Загрузка учеников
            async function loadStudents() {
                const { data } = await _supabase.from('students').select('*').order('name');
                students = data || [];
                const select = document.getElementById('materialStudent');
                if (select) {
                    let options = '<option value="ALL">🌟 ДЛЯ ВСЕХ</option>';
                    students.forEach(s => options += `<option value="${s.login}">👤 ${s.name}</option>`);
                    select.innerHTML = options;
                }
            }
            
            // Загрузка материалов
            async function loadMaterials() {
                const { data } = await _supabase.from('library_materials').select('*').order('created_at', { ascending: false });
                materials = data || [];
                const grid = document.getElementById('materialsGrid');
                if (materials.length === 0) {
                    grid.innerHTML = '<div class="empty-state">📭 Материалов пока нет</div>';
                    return;
                }
                let html = '';
                for (let m of materials) {
                    let preview = m.type === 'video' ? '<div class="material-preview">🎥</div>' : `<div class="material-preview"><img src="${m.file_url}" alt="${m.title}"></div>`;
                    html += `<div class="material-card">
                        ${preview}
                        <div class="material-info">
                            <div class="material-title">${escapeHtml(m.title)}</div>
                            <div>${escapeHtml(m.description)}</div>
                            <div class="material-meta">
                                <span>${m.student_login === 'ALL' ? '🌟 Для всех' : `👤 ${m.student_display || 'Ученик'}`}</span>
                                <span>📅 ${m.date}</span>
                            </div>
                        </div>
                    </div>`;
                }
                grid.innerHTML = html;
            }
            
            // Загрузка файла в Storage
            async function uploadFile(file, path) {
                const { error } = await _supabase.storage.from('guitar-studio').upload(path, file);
                if (error) throw error;
                const { data } = _supabase.storage.from('guitar-studio').getPublicUrl(path);
                return data.publicUrl;
            }
            
            // Загрузка материала
            document.getElementById('uploadBtn').onclick = async () => {
                const errorDiv = document.getElementById('uploadError');
                errorDiv.style.display = 'none';
                
                const type = document.getElementById('materialType').value;
                const file = document.getElementById('materialFile').files[0];
                const title = document.getElementById('materialTitle').value.trim();
                const description = document.getElementById('materialDescription').value.trim();
                const target = document.getElementById('materialStudent').value;
                
                if (!file) { errorDiv.innerHTML = '❌ Выберите файл'; errorDiv.style.display = 'block'; return; }
                if (!title) { errorDiv.innerHTML = '❌ Введите название'; errorDiv.style.display = 'block'; return; }
                if (!description) { errorDiv.innerHTML = '❌ Введите описание'; errorDiv.style.display = 'block'; return; }
                if (!target) { errorDiv.innerHTML = '❌ Выберите получателя'; errorDiv.style.display = 'block'; return; }
                
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
                const filePath = `materials/${fileName}`;
                
                try {
                    const fileUrl = await uploadFile(file, filePath);
                    const studentName = target === 'ALL' ? 'Все ученики' : (students.find(s => s.login === target)?.name || target);
                    
                    const { error } = await _supabase.from('library_materials').insert([{
                        type: type,
                        title: title,
                        description: description,
                        student_login: target,
                        student_display: target === 'ALL' ? '🌟 Для всех учеников' : studentName,
                        date: new Date().toLocaleString(),
                        file_name: file.name,
                        file_url: fileUrl,
                        created_at: new Date()
                    }]);
                    
                    if (error) throw error;
                    
                    alert('✅ Материал загружен');
                    document.getElementById('materialFile').value = '';
                    document.getElementById('materialTitle').value = '';
                    document.getElementById('materialDescription').value = '';
                    await loadMaterials();
                    
                } catch (err) {
                    errorDiv.innerHTML = '❌ Ошибка: ' + err.message;
                    errorDiv.style.display = 'block';
                }
            };
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            loadStudents();
            loadMaterials();
        })();
    </script>
</body>
</html>
